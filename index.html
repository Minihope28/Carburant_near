<!DOCTYPE html>

<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0a0a0a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>FuelFinder — Stations en France</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <style>
/* ============================================
   FUELFINDER PRO — Premium Dark UI
   Fonts: Syne (display) + DM Sans (body)
   Palette: #0a0a0a + Amber + Slate
   Toutes les classes originales préservées
============================================ */

:root {
–bg:          #0a0a0c;
–bg-2:        #111116;
–bg-3:        #18181f;
–bg-4:        #1f1f28;
–border:      rgba(255,255,255,0.07);
–border-hi:   rgba(255,255,255,0.13);

–amber:       #f59e0b;
–amber-lt:    #fbbf24;
–amber-bg:    rgba(245,158,11,0.12);
–amber-ring:  rgba(245,158,11,0.3);

–green:       #10b981;
–green-bg:    rgba(16,185,129,0.12);
–blue:        #3b82f6;
–blue-bg:     rgba(59,130,246,0.12);
–red:         #ef4444;
–red-bg:      rgba(239,68,68,0.12);

–t1: #f1f1f3;
–t2: #a1a1aa;
–t3: #71717a;
–t4: #52525b;

–font-d: ‘Syne’, sans-serif;
–font-b: ‘DM Sans’, sans-serif;

–r-sm: 8px;
–r-md: 12px;
–r-lg: 16px;

–header-h: 64px;
–nav-h:    68px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-tap-highlight-color: transparent; }

body {
background: var(–bg);
color: var(–t1);
font-family: var(–font-b);
font-size: 15px;
line-height: 1.5;
min-height: 100dvh;
overflow-x: hidden;
}

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(–bg-4); border-radius: 99px; }

/* ── TOAST ── */
.toast {
position: fixed;
top: 76px;
left: 50%;
transform: translateX(-50%) translateY(-6px);
background: var(–bg-4);
border: 1px solid var(–border-hi);
border-radius: 99px;
padding: 9px 18px;
display: flex;
align-items: center;
gap: 8px;
font-family: var(–font-b);
font-size: 13px;
font-weight: 500;
color: var(–t1);
white-space: nowrap;
opacity: 0;
pointer-events: none;
z-index: 9999;
transition: opacity 0.2s, transform 0.2s;
box-shadow: 0 8px 32px rgba(0,0,0,0.5);
}
.toast.show {
opacity: 1;
transform: translateX(-50%) translateY(0);
}
.toast-icon { font-size: 14px; }
.toast-text { font-size: 13px; }

/* ── SUGGESTIONS PORTAL ── */
.suggestions-portal {
position: fixed;
z-index: 5000;
background: var(–bg-3);
border: 1px solid var(–border-hi);
border-radius: var(–r-md);
overflow: hidden;
box-shadow: 0 16px 48px rgba(0,0,0,0.6);
max-height: 260px;
overflow-y: auto;
}
.suggestions-portal.hidden { display: none; }

.suggestion-item {
display: flex;
align-items: flex-start;
gap: 10px;
padding: 11px 16px;
cursor: pointer;
border-bottom: 1px solid var(–border);
transition: background 0.12s;
}
.suggestion-item:last-child { border-bottom: none; }
.suggestion-item:hover { background: var(–bg-4); }
.suggestion-icon { color: var(–t3); font-size: 12px; margin-top: 3px; flex-shrink: 0; }
.suggestion-text { font-size: 14px; font-weight: 500; color: var(–t1); line-height: 1.3; }
.suggestion-context { font-size: 11px; color: var(–t3); margin-top: 2px; }

/* ── HEADER ── */
.app-header {
position: fixed;
top: 0; left: 0; right: 0;
height: var(–header-h);
background: rgba(10,10,12,0.9);
backdrop-filter: blur(20px);
-webkit-backdrop-filter: blur(20px);
border-bottom: 1px solid var(–border);
z-index: 1000;
}
.header-inner {
max-width: 1280px;
margin: 0 auto;
height: 100%;
padding: 0 20px;
display: flex;
align-items: center;
justify-content: space-between;
}
.brand { display: flex; align-items: center; gap: 12px; }
.brand-mark {
width: 38px; height: 38px;
background: var(–amber);
border-radius: var(–r-sm);
display: flex;
align-items: center;
justify-content: center;
color: #000;
font-size: 15px;
flex-shrink: 0;
}
.brand-text { display: flex; flex-direction: column; gap: 1px; }
.brand-name {
font-family: var(–font-d);
font-weight: 800;
font-size: 18px;
letter-spacing: -0.3px;
color: var(–t1);
line-height: 1;
}
.brand-sub { font-size: 11px; color: var(–t3); letter-spacing: 0.2px; }

.btn-refresh {
width: 38px; height: 38px;
background: var(–bg-3);
border: 1px solid var(–border);
border-radius: var(–r-sm);
color: var(–t2);
cursor: pointer;
display: flex;
align-items: center;
justify-content: center;
font-size: 14px;
transition: all 0.15s;
}
.btn-refresh:hover { background: var(–bg-4); color: var(–t1); border-color: var(–border-hi); }
.btn-refresh.animate-spin i { animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── LAYOUT ── */
.app-main {
max-width: 1280px;
margin: 0 auto;
padding: calc(var(–header-h) + 24px) 20px 32px;
display: grid;
grid-template-columns: 310px 1fr;
gap: 18px;
align-items: start;
}

/* ── CONTROLS ── */
.panel-controls {
display: flex;
flex-direction: column;
gap: 8px;
position: sticky;
top: calc(var(–header-h) + 20px);
}

.ctrl-card {
background: var(–bg-2);
border: 1px solid var(–border);
border-radius: var(–r-lg);
padding: 18px;
}

.ctrl-header {
display: flex;
align-items: center;
justify-content: space-between;
margin-bottom: 14px;
}
.ctrl-label {
font-family: var(–font-d);
font-size: 10px;
font-weight: 700;
letter-spacing: 1.2px;
text-transform: uppercase;
color: var(–t3);
}
.value-pill {
font-family: var(–font-d);
font-size: 12px;
font-weight: 700;
color: var(–amber);
background: var(–amber-bg);
border: 1px solid var(–amber-ring);
border-radius: 99px;
padding: 3px 10px;
}
.text-link {
background: none;
border: none;
cursor: pointer;
color: var(–blue);
font-family: var(–font-b);
font-size: 13px;
font-weight: 500;
display: flex;
align-items: center;
gap: 5px;
padding: 0;
transition: color 0.15s;
}
.text-link:hover { color: var(–t1); }

/* Search input — garde les classes originales */
.autocomplete-container { position: relative; }

.search-shell {
display: flex;
align-items: center;
background: var(–bg-3);
border: 1px solid var(–border);
border-radius: var(–r-md);
overflow: hidden;
transition: border-color 0.15s, box-shadow 0.15s;
}
.search-shell:focus-within {
border-color: var(–amber);
box-shadow: 0 0 0 3px var(–amber-bg);
}
.search-icon { padding: 0 12px; color: var(–t3); font-size: 13px; flex-shrink: 0; }
.search-input {
flex: 1;
background: none;
border: none;
outline: none;
color: var(–t1);
font-family: var(–font-b);
font-size: 14px;
padding: 11px 6px 11px 0;
min-width: 0;
}
.search-input::placeholder { color: var(–t4); }
.search-btn {
background: var(–amber);
color: #000;
border: none;
padding: 11px 15px;
font-family: var(–font-d);
font-size: 13px;
font-weight: 700;
cursor: pointer;
white-space: nowrap;
transition: background 0.15s;
flex-shrink: 0;
}
.search-btn:hover { background: var(–amber-lt); }

.current-location {
display: flex;
align-items: center;
gap: 7px;
margin-top: 10px;
padding: 8px 12px;
background: var(–blue-bg);
border: 1px solid rgba(59,130,246,0.2);
border-radius: var(–r-sm);
font-size: 13px;
color: var(–blue);
word-break: break-word;
}
.current-location.hidden { display: none; }

/* Range */
.range-input {
width: 100%;
-webkit-appearance: none;
appearance: none;
height: 3px;
background: var(–bg-4);
border-radius: 99px;
outline: none;
cursor: pointer;
}
.range-input::-webkit-slider-thumb {
-webkit-appearance: none;
width: 18px; height: 18px;
border-radius: 50%;
background: var(–amber);
border: 3px solid var(–bg-2);
cursor: pointer;
box-shadow: 0 0 0 2px var(–amber-bg);
transition: box-shadow 0.15s;
}
.range-input::-webkit-slider-thumb:hover { box-shadow: 0 0 0 5px var(–amber-bg); }
.range-labels {
display: flex;
justify-content: space-between;
margin-top: 8px;
font-size: 11px;
color: var(–t4);
}

/* Segments (fuel + sort) — garde les classes originales */
.segment-grid { display: grid; gap: 6px; }
.fuel-grid  { grid-template-columns: repeat(3, 1fr); }
.sort-grid  { grid-template-columns: repeat(3, 1fr); }

.segment-btn {
background: var(–bg-3);
border: 1px solid var(–border);
border-radius: var(–r-md);
padding: 12px 8px;
display: flex;
flex-direction: column;
align-items: center;
gap: 3px;
cursor: pointer;
transition: all 0.15s;
text-align: center;
color: var(–t2);
}
.segment-btn:hover { border-color: var(–border-hi); background: var(–bg-4); }
.segment-btn.active {
background: var(–amber-bg);
border-color: var(–amber);
color: var(–amber);
}
.segment-title {
font-family: var(–font-d);
font-size: 12px;
font-weight: 700;
color: inherit;
line-height: 1;
}
.segment-subtitle { font-size: 10px; color: var(–t3); }
.segment-btn.active .segment-title  { color: var(–amber); }
.segment-btn.active .segment-subtitle { color: rgba(245,158,11,0.7); }

.segment-btn-sm {
flex-direction: row;
gap: 6px;
padding: 11px 6px;
font-size: 12px;
font-weight: 500;
font-family: var(–font-b);
justify-content: center;
}
.segment-btn-sm i { font-size: 11px; }

/* ── RESULTS ── */
.panel-results { display: flex; flex-direction: column; gap: 12px; }

.summary-card {
background: var(–bg-2);
border: 1px solid var(–border);
border-radius: var(–r-lg);
padding: 20px 22px;
}
.summary-top {
display: flex;
align-items: center;
justify-content: space-between;
margin-bottom: 16px;
}
.summary-left { display: flex; align-items: center; gap: 12px; }
.status-dot {
width: 9px; height: 9px;
border-radius: 50%;
background: var(–t4);
flex-shrink: 0;
transition: background 0.3s, box-shadow 0.3s;
}
.status-dot.active {
background: var(–green);
box-shadow: 0 0 8px rgba(16,185,129,0.5);
}
.summary-kicker {
font-size: 10px;
font-weight: 600;
letter-spacing: 1.2px;
text-transform: uppercase;
color: var(–t4);
margin-bottom: 2px;
}
.summary-title {
font-family: var(–font-d);
font-size: 17px;
font-weight: 700;
color: var(–t1);
letter-spacing: -0.2px;
}
.count-badge {
font-family: var(–font-d);
font-size: 12px;
font-weight: 700;
color: var(–t2);
background: var(–bg-4);
border: 1px solid var(–border);
border-radius: 99px;
padding: 5px 14px;
white-space: nowrap;
}
.summary-metrics {
display: flex;
background: var(–bg-3);
border: 1px solid var(–border);
border-radius: var(–r-md);
overflow: hidden;
}
.metric-box { flex: 1; padding: 14px 16px; display: flex; flex-direction: column; gap: 4px; }
.metric-sep { width: 1px; background: var(–border); align-self: stretch; }
.metric-label {
font-size: 10px;
font-weight: 600;
letter-spacing: 0.8px;
text-transform: uppercase;
color: var(–t4);
}
.metric-value {
font-family: var(–font-d);
font-size: 18px;
font-weight: 700;
color: var(–t1);
line-height: 1;
}
.metric-amber { color: var(–amber); }

/* ── STATIONS LIST ── */
.stations-list { display: flex; flex-direction: column; gap: 8px; }

/* Empty / loading / error */
.empty-state, .loading-state, .error-state {
background: var(–bg-2);
border: 1px solid var(–border);
border-radius: var(–r-lg);
padding: 56px 24px;
text-align: center;
}
.error-state { border-color: rgba(239,68,68,0.2); }

.empty-icon {
width: 56px; height: 56px;
background: var(–bg-3);
border: 1px solid var(–border);
border-radius: var(–r-md);
display: flex;
align-items: center;
justify-content: center;
font-size: 22px;
color: var(–t4);
margin: 0 auto 18px;
}
.empty-title {
font-family: var(–font-d);
font-size: 15px;
font-weight: 700;
color: var(–t2);
margin-bottom: 6px;
}
.empty-sub { font-size: 13px; color: var(–t4); }

.spinner {
width: 30px; height: 30px;
border: 3px solid var(–bg-4);
border-top-color: var(–amber);
border-radius: 50%;
animation: spin 0.8s linear infinite;
margin: 0 auto 16px;
}

/* ── STATION CARD ── */
.station-card {
background: var(–bg-2);
border: 1px solid var(–border);
border-radius: var(–r-lg);
overflow: hidden;
transition: border-color 0.15s, box-shadow 0.15s, transform 0.15s;
animation: fadeUp 0.3s ease both;
}
.station-card:hover {
border-color: var(–border-hi);
transform: translateY(-1px);
box-shadow: 0 8px 24px rgba(0,0,0,0.4);
}
@keyframes fadeUp {
from { opacity: 0; transform: translateY(8px); }
to   { opacity: 1; transform: translateY(0); }
}

.card-body {
padding: 18px 20px;
display: flex;
gap: 14px;
align-items: flex-start;
}
.card-main { flex: 1; min-width: 0; }
.card-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 8px; }

.badge {
display: inline-flex;
align-items: center;
gap: 5px;
font-size: 11px;
font-weight: 600;
border-radius: 99px;
padding: 3px 9px;
}
.badge-green { background: var(–green-bg); color: var(–green); border: 1px solid rgba(16,185,129,0.25); }
.badge-blue  { background: var(–blue-bg);  color: var(–blue);  border: 1px solid rgba(59,130,246,0.25); }
.badge-orange { background: var(–amber-bg); color: var(–amber); border: 1px solid var(–amber-ring); }

.card-address {
font-size: 14px;
color: var(–t1);
font-weight: 500;
line-height: 1.4;
margin-bottom: 10px;
display: -webkit-box;
-webkit-line-clamp: 2;
-webkit-box-orient: vertical;
overflow: hidden;
}
.card-meta {
display: flex;
flex-wrap: wrap;
gap: 12px;
font-size: 12px;
color: var(–t3);
}
.card-meta-item { display: flex; align-items: center; gap: 5px; }
.card-meta-item i { font-size: 11px; }
.meta-dist { color: var(–blue); font-weight: 600; }

/* Price block */
.card-price { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; flex-shrink: 0; }

.price-tag {
background: var(–amber);
color: #000;
font-family: var(–font-d);
font-size: 17px;
font-weight: 800;
border-radius: var(–r-md);
padding: 10px 13px;
white-space: nowrap;
letter-spacing: -0.5px;
}
.price-tag.medium {
background: var(–bg-4);
color: var(–t1);
border: 1px solid var(–border-hi);
}
.price-tag.expensive {
background: var(–bg-4);
color: var(–t2);
border: 1px solid var(–border);
}
.price-delta { font-size: 11px; color: var(–t4); font-weight: 500; }
.price-top   { font-size: 11px; color: var(–green); font-weight: 600; }

/* Card footer */
.card-footer {
display: flex;
align-items: center;
justify-content: space-between;
padding: 11px 20px;
border-top: 1px solid var(–border);
background: rgba(255,255,255,0.012);
}
.btn-directions {
display: inline-flex;
align-items: center;
gap: 7px;
font-size: 13px;
font-weight: 500;
color: var(–blue);
text-decoration: none;
transition: color 0.15s;
background: none;
border: none;
cursor: pointer;
padding: 0;
font-family: var(–font-b);
}
.btn-directions:hover { color: var(–t1); }

.btn-fav {
background: none;
border: none;
cursor: pointer;
color: var(–t4);
font-size: 17px;
padding: 4px;
transition: color 0.15s;
display: flex;
align-items: center;
}
.btn-fav:hover { color: var(–red); }

/* ── BOTTOM NAV ── */
.bottom-nav {
display: none;
position: fixed;
bottom: 0; left: 0; right: 0;
background: rgba(10,10,12,0.96);
backdrop-filter: blur(20px);
-webkit-backdrop-filter: blur(20px);
border-top: 1px solid var(–border);
z-index: 999;
}
.nav-inner {
display: flex;
padding: 8px 0 calc(8px + env(safe-area-inset-bottom));
}
.nav-item {
flex: 1;
display: flex;
flex-direction: column;
align-items: center;
gap: 4px;
background: none;
border: none;
cursor: pointer;
color: var(–t4);
font-family: var(–font-b);
font-size: 11px;
font-weight: 500;
padding: 6px 0;
transition: color 0.15s;
}
.nav-item i { font-size: 19px; }
.nav-item-active { color: var(–amber) !important; }

/* ── RESPONSIVE ── */
.mobile-only { display: none; }

@media (max-width: 860px) {
.app-main {
grid-template-columns: 1fr;
padding-bottom: calc(var(–nav-h) + 20px);
gap: 12px;
}
.panel-controls { position: static; }
.mobile-only { display: block; }
.bottom-nav  { display: block; }
.summary-metrics { flex-wrap: wrap; }
.metric-box { min-width: 100px; }
}

@media (max-width: 480px) {
.app-main { padding-left: 12px; padding-right: 12px; }
.card-body { padding: 14px; gap: 10px; }
.card-footer { padding: 10px 14px; }
.price-tag { font-size: 15px; padding: 9px 11px; }
.metric-value { font-size: 15px; }
.summary-card { padding: 16px; }
.metric-box { padding: 11px 12px; }
}

</style>
</head>

      oninput="updateRadius(this.value)" onchange="onRadiusChange()" />

      <span>1 km</span><span>5 km</span><span>10 km</span>

  </section>

  <script>
const CONFIG = {
  fuelApiUrl: "https://divine-voice-7f84.hamzaamal97-ha.workers.dev",
  geocodeUrl: "https://data.geopf.fr/geocodage/search",
  reverseGeocodeUrl: "https://data.geopf.fr/geocodage/reverse",
  radius: 5,
  selectedFuel: "E10",
  sortBy: "distance"
};

let stations = [];
let currentPosition = null;
let debounceTimer = null;
let suggestionsData = [];

document.addEventListener("DOMContentLoaded", () => {
  setupAutocomplete();
  updateSummary();
});

function setupAutocomplete() {
  const input = document.getElementById("addressInput");

  input.addEventListener("input", (e) => {
    const query = e.target.value.trim();

    if (query.length < 3) {
      hideSuggestionsPortal();
      return;
    }

    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(() => fetchSuggestions(query), 300);
  });

  input.addEventListener("keypress", (e) => {
    if (e.key === "Enter") {
      hideSuggestionsPortal();
      searchAddress();
    }
  });

  document.addEventListener("click", (e) => {
    if (
      !e.target.closest(".autocomplete-container") &&
      !e.target.closest("#suggestionsPortal")
    ) {
      hideSuggestionsPortal();
    }
  });

  window.addEventListener("resize", updateSuggestionsPortalPosition);
  window.addEventListener("scroll", updateSuggestionsPortalPosition, true);
}

async function fetchSuggestions(query) {
  try {
    const url = `${CONFIG.geocodeUrl}?q=${encodeURIComponent(query)}&limit=5&autocomplete=1`;
    const response = await fetch(url);

    if (!response.ok) {
      throw new Error(`HTTP ${response.status}`);
    }

    const data = await response.json();
    displaySuggestions(data.features || []);
  } catch (error) {
    console.error("Erreur autocomplétion :", error);
    hideSuggestionsPortal();
  }
}

function displaySuggestions(suggestions) {
  const portal = document.getElementById("suggestionsPortal");
  const input = document.getElementById("addressInput");
  const currentQuery = input.value.trim();

  suggestionsData = suggestions || [];

  if (!suggestionsData.length) {
    hideSuggestionsPortal();
    return;
  }

  const rect = input.getBoundingClientRect();

  portal.style.left = `${rect.left}px`;
  portal.style.top = `${rect.bottom + 6}px`;
  portal.style.width = `${rect.width}px`;

  portal.innerHTML = suggestionsData
    .map((feature, index) => {
      const label = feature.properties?.label || "Adresse";
      const context = feature.properties?.context || "";
      const type = feature.properties?.type || "";

      let icon = "fa-map-marker-alt";
      if (type === "housenumber") icon = "fa-home";
      else if (type === "street") icon = "fa-road";
      else if (type === "municipality" || type === "locality") icon = "fa-city";

      return `
        <div class="suggestion-item" onclick="selectSuggestionByIndex(${index})">
          <i class="fas ${icon} suggestion-icon"></i>
          <div style="flex:1;">
            <div class="suggestion-text">${highlightMatch(label, currentQuery)}</div>
            <div class="suggestion-context">${escapeHtml(context)}</div>
          </div>
        </div>
      `;
    })
    .join("");

  portal.classList.remove("hidden");
}

function hideSuggestionsPortal() {
  const portal = document.getElementById("suggestionsPortal");
  portal.classList.add("hidden");
  portal.innerHTML = "";
}

function updateSuggestionsPortalPosition() {
  const portal = document.getElementById("suggestionsPortal");
  const input = document.getElementById("addressInput");

  if (portal.classList.contains("hidden")) return;

  const rect = input.getBoundingClientRect();
  portal.style.left = `${rect.left}px`;
  portal.style.top = `${rect.bottom + 6}px`;
  portal.style.width = `${rect.width}px`;
}

async function selectSuggestionByIndex(index) {
  const feature = suggestionsData[index];
  if (!feature) return;

  const label = feature.properties?.label || "Adresse";
  const coords = feature.geometry?.coordinates || [0, 0];

  await selectSuggestion(label, coords[1], coords[0]);
  hideSuggestionsPortal();
}

function escapeRegExp(string) {
  return string.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
}

function highlightMatch(text, query) {
  if (!query) return escapeHtml(text);

  const safeText = escapeHtml(text);
  const safeQuery = escapeRegExp(query);
  const regex = new RegExp(`(${safeQuery})`, "gi");

  return safeText.replace(
    regex,
    '<span style="color:#60a5fa;font-weight:600;">$1</span>'
  );
}

async function selectSuggestion(label, lat, lon) {
  document.getElementById("addressInput").value = label;
  hideSuggestionsPortal();

  currentPosition = {
    lat: parseFloat(lat),
    lon: parseFloat(lon)
  };

  document.getElementById("currentLocationText").textContent = label;
  document.getElementById("currentLocationDisplay").classList.remove("hidden");

  await searchStations(currentPosition.lat, currentPosition.lon);
}

function updateRadius(value) {
  CONFIG.radius = parseFloat(value);
  document.getElementById("radiusValue").textContent = `${value} km`;
}

function onRadiusChange() {
  if (currentPosition) {
    searchStations(currentPosition.lat, currentPosition.lon);
  }
}

function selectFuel(fuel) {
  CONFIG.selectedFuel = fuel;

  document.querySelectorAll("[data-fuel]").forEach((btn) => {
    btn.classList.remove("active");
    if (btn.dataset.fuel === fuel) {
      btn.classList.add("active");
    }
  });

  updateSummary();

  if (currentPosition) {
    searchStations(currentPosition.lat, currentPosition.lon);
  }
}

function setSort(sortType) {
  CONFIG.sortBy = sortType;

  document.querySelectorAll("[data-sort]").forEach((btn) => {
    btn.classList.remove("active");
    if (btn.dataset.sort === sortType) {
      btn.classList.add("active");
    }
  });

  if (stations.length) {
    sortAndDisplayStations();
  }
}

async function useMyLocation() {
  if (!navigator.geolocation) {
    showToast("Géolocalisation non supportée", "error");
    return;
  }

  showToast("Recherche de votre position...", "info");

  navigator.geolocation.getCurrentPosition(
    async (position) => {
      const { latitude, longitude } = position.coords;
      currentPosition = { lat: latitude, lon: longitude };

      try {
        const response = await fetch(
          `${CONFIG.reverseGeocodeUrl}?lon=${longitude}&lat=${latitude}&limit=1`
        );

        if (response.ok) {
          const data = await response.json();
          const label =
            data.features?.[0]?.properties?.label || "Position actuelle";

          document.getElementById("addressInput").value = label;
          document.getElementById("currentLocationText").textContent = label;
          document.getElementById("currentLocationDisplay").classList.remove("hidden");
        }
      } catch (error) {
        console.warn("Reverse geocoding impossible :", error);
      }

      await searchStations(latitude, longitude);
      showToast("Position trouvée", "success");
    },
    (error) => {
      console.error(error);
      showToast("Impossible d’obtenir la position", "error");
    },
    {
      enableHighAccuracy: true,
      timeout: 10000,
      maximumAge: 60000
    }
  );
}

async function searchAddress() {
  const query = document.getElementById("addressInput").value.trim();

  if (!query) {
    showToast("Entrez une adresse", "error");
    return;
  }

  hideSuggestionsPortal();
  showToast("Recherche...", "info");

  try {
    const response = await fetch(
      `${CONFIG.geocodeUrl}?q=${encodeURIComponent(query)}&limit=1`
    );

    if (!response.ok) {
      throw new Error(`HTTP ${response.status}`);
    }

    const data = await response.json();

    if (!data.features || !data.features.length) {
      showToast("Adresse non trouvée", "error");
      return;
    }

    const feature = data.features[0];
    const [lon, lat] = feature.geometry.coordinates;
    const address = feature.properties?.label || query;

    currentPosition = {
      lat: parseFloat(lat),
      lon: parseFloat(lon)
    };

    document.getElementById("addressInput").value = address;
    document.getElementById("currentLocationText").textContent = address;
    document.getElementById("currentLocationDisplay").classList.remove("hidden");

    await searchStations(currentPosition.lat, currentPosition.lon);
  } catch (error) {
    console.error("Erreur recherche adresse :", error);
    showToast("Erreur pendant la recherche", "error");
  }
}

async function searchStations(lat, lon) {
  document.getElementById("stationsList").innerHTML = `
    <div class="loading-state">
      <div class="spinner"></div>
      <p class="empty-title">Recherche des stations...</p>
      <p class="empty-sub">Cela peut prendre quelques secondes</p>
    </div>
  `;
  const dot = document.getElementById("statusDot");
  if (dot) dot.classList.remove("active");

  try {
    const url =
      `${CONFIG.fuelApiUrl}` +
      `?lat=${encodeURIComponent(lat)}` +
      `&lon=${encodeURIComponent(lon)}` +
      `&radius=${encodeURIComponent(CONFIG.radius)}`;

    const response = await fetch(url, {
      headers: { Accept: "application/json" }
    });

    if (!response.ok) {
      throw new Error(`HTTP ${response.status}`);
    }

    const data = await response.json();

    if (!data.results || !Array.isArray(data.results)) {
      throw new Error("Réponse API invalide");
    }

    processStations(data.results, lat, lon);
  } catch (error) {
    console.error("Erreur recherche stations :", error);
    stations = [];
    updateSummary();
    showError("Impossible de charger les stations pour le moment. Réessayez un peu plus tard.");
  }
}

function processStations(results, userLat, userLon) {
  stations = [];

  for (const fields of results) {
    const lat = parseFloat(fields.latitude);
    const lon = parseFloat(fields.longitude);

    if (Number.isNaN(lat) || Number.isNaN(lon)) continue;

    const distance = fields._distance
      ? fields._distance / 1000
      : calculateDistance(userLat, userLon, lat, lon);

    let price = null;

    if (CONFIG.selectedFuel === "E10") {
      price = parseFloat(fields.e10_prix);
    } else if (CONFIG.selectedFuel === "SP98") {
      price = parseFloat(fields.sp98_prix);
    } else if (CONFIG.selectedFuel === "Gazole") {
      price = parseFloat(fields.gazole_prix);
    }

    if (!price || price <= 0) continue;

    stations.push({
      id: String(fields.id || Math.random().toString(36).slice(2)),
      brand: "Station",
      address: `${fields.adresse || ""}, ${fields.cp || ""} ${fields.ville || ""}`.trim(),
      lat,
      lon,
      price,
      distance,
      fuel: CONFIG.selectedFuel,
      updateTime: new Date().toISOString()
    });
  }

  if (!stations.length) {
    updateSummary();
    showEmpty("Aucune station trouvée dans ce rayon pour ce carburant.");
    return;
  }

  sortAndDisplayStations();
  showToast(`${stations.length} stations trouvées`, "success");
}

function calculateDistance(lat1, lon1, lat2, lon2) {
  const R = 6371;
  const dLat = ((lat2 - lat1) * Math.PI) / 180;
  const dLon = ((lon2 - lon1) * Math.PI) / 180;

  const a =
    Math.sin(dLat / 2) * Math.sin(dLat / 2) +
    Math.cos((lat1 * Math.PI) / 180) *
      Math.cos((lat2 * Math.PI) / 180) *
      Math.sin(dLon / 2) *
      Math.sin(dLon / 2);

  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
  return Math.round(R * c * 100) / 100;
}

function sortAndDisplayStations() {
  if (!stations.length) return;

  if (CONFIG.sortBy === "distance") {
    stations.sort((a, b) => a.distance - b.distance);
  } else if (CONFIG.sortBy === "price") {
    stations.sort((a, b) => a.price - b.price);
  } else if (CONFIG.sortBy === "both") {
    const maxDist = Math.max(...stations.map((s) => s.distance), 0.1);
    const minPrice = Math.min(...stations.map((s) => s.price));
    const maxPrice = Math.max(...stations.map((s) => s.price));
    const priceRange = maxPrice - minPrice || 1;

    stations.forEach((s) => {
      const priceScore = (s.price - minPrice) / priceRange;
      const distScore = s.distance / maxDist;
      s.score = priceScore * 0.6 + distScore * 0.4;
    });

    stations.sort((a, b) => a.score - b.score);
  }

  updateSummary();
  updateUI();
}

function updateSummary() {
  const fuelMap = {
    E10: "SP95-E10",
    SP98: "SP98",
    Gazole: "Gazole"
  };

  const bestPriceEl = document.getElementById("bestPriceValue");
  const closestEl = document.getElementById("closestValue");
  const fuelEl = document.getElementById("fuelValue");
  const countEl = document.getElementById("stationCount");

  if (fuelEl) fuelEl.textContent = fuelMap[CONFIG.selectedFuel] || CONFIG.selectedFuel;

  if (!stations.length) {
    if (bestPriceEl) bestPriceEl.textContent = "—";
    if (closestEl) closestEl.textContent = "—";
    if (countEl) countEl.textContent = "0 station";
    return;
  }

  const cheapestPrice = Math.min(...stations.map((s) => s.price));
  const closestDistance = Math.min(...stations.map((s) => s.distance));

  if (bestPriceEl) bestPriceEl.textContent = `${cheapestPrice.toFixed(3)}€`;
  if (closestEl) closestEl.textContent = `${closestDistance.toFixed(1)} km`;
  if (countEl) countEl.textContent = `${stations.length} station${stations.length > 1 ? "s" : ""}`;
}

function updateUI() {
  const stationsList = document.getElementById("stationsList");
  const cheapestPrice = Math.min(...stations.map((s) => s.price));
  const closestDistance = Math.min(...stations.map((s) => s.distance));

  const dot = document.getElementById("statusDot");
  if (dot) dot.classList.add("active");

  const cards = stations.slice(0, 20).map((station, index) => {
    const isCheapest = station.price === cheapestPrice;
    const isClosest  = station.distance === closestDistance;

    const priceClass = isCheapest ? "" : station.price > cheapestPrice * 1.03 ? "expensive" : "medium";

    let badges = "";
    if (isCheapest) badges += '<span class="badge badge-green"><i class="fas fa-check"></i> Meilleur prix</span>';
    if (isClosest)  badges += '<span class="badge badge-blue"><i class="fas fa-location-arrow"></i> Plus proche</span>';
    if (!isCheapest && !isClosest && CONFIG.sortBy === "both")
      badges += '<span class="badge badge-orange"><i class="fas fa-balance-scale"></i> Bon compromis</span>';

    const mapsUrl = "https://www.google.com/maps/dir/?api=1&destination=" +
      encodeURIComponent(station.address) + "&travelmode=driving";

    const updateDate = formatUpdateDate(station.updateTime);
    const priceDelta = ((station.price - cheapestPrice) * 100).toFixed(1);
    const tagsHtml   = badges ? '<div class="card-tags">' + badges + "</div>" : "";
    const priceExtra = isCheapest
      ? '<span class="price-top"><i class="fas fa-star"></i> Top prix</span>'
      : '<span class="price-delta">+' + priceDelta + " c</span>";

    return '<div class="station-card" style="animation-delay:' + (index * 0.04) + 's">' +
      '<div class="card-body">' +
        '<div class="card-main">' +
          tagsHtml +
          '<p class="card-address">' + escapeHtml(station.address) + "</p>" +
          '<div class="card-meta">' +
            '<span class="card-meta-item"><i class="fas fa-map-marker-alt"></i>' +
              '<span class="meta-dist">' + station.distance.toFixed(1) + " km</span></span>" +
            '<span class="card-meta-item"><i class="fas fa-clock"></i>' +
              "<span>" + updateDate + "</span></span>" +
          "</div>" +
        "</div>" +
        '<div class="card-price">' +
          '<div class="price-tag ' + priceClass + '">' + station.price.toFixed(3) + "\u20ac</div>" +
          priceExtra +
        "</div>" +
      "</div>" +
      '<div class="card-footer">' +
        '<a href="' + mapsUrl + '" target="_blank" rel="noopener noreferrer" class="btn-directions">' +
          '<i class="fas fa-directions"></i> Itin\u00e9raire Maps' +
        "</a>" +
        '<button onclick="toggleFavorite(\'' + station.id + '\')" class="btn-fav" id="fav-' + station.id + '" aria-label="Favori">' +
          '<i class="far fa-heart"></i>' +
        "</button>" +
      "</div>" +
    "</div>";
  });

  stationsList.innerHTML = cards.join("");
}


function formatUpdateDate(dateString) {
  try {
    const date = new Date(dateString);
    if (Number.isNaN(date.getTime())) return "Maj inconnue";

    return date.toLocaleString("fr-FR", {
      day: "2-digit",
      month: "2-digit",
      hour: "2-digit",
      minute: "2-digit"
    });
  } catch {
    return "Maj inconnue";
  }
}

function escapeHtml(str) {
  if (typeof str !== "string") return "";
  return str
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function showError(message) {
  document.getElementById("stationsList").innerHTML = `
    <div class="error-state">
      <div class="empty-icon" style="background:var(--red-bg);color:var(--red);margin:0 auto 18px;">
        <i class="fas fa-exclamation-triangle"></i>
      </div>
      <p class="empty-title" style="color:var(--red)">${escapeHtml(message)}</p>
      <button onclick="refreshData()" style="margin-top:16px;background:var(--amber);color:#000;border:none;padding:10px 20px;border-radius:8px;font-weight:700;font-size:13px;cursor:pointer;font-family:var(--font-d,sans-serif);">
        Réessayer
      </button>
    </div>
  `;
}

function showEmpty(message) {
  document.getElementById("stationsList").innerHTML = `
    <div class="empty-state">
      <div class="empty-icon"><i class="fas fa-search"></i></div>
      <p class="empty-title">${escapeHtml(message)}</p>
      <p class="empty-sub">Essaie d&#39;augmenter le rayon ou de changer de carburant</p>
    </div>
  `;
}

function refreshData() {
  const btn = document.getElementById("refreshBtn");
  btn.querySelector('i').style.animation = 'spin 0.8s linear infinite';
  setTimeout(() => { btn.querySelector('i').style.animation = ''; }, 900);

  if (!currentPosition) {
    showToast("Entrez d’abord une adresse", "error");
    return;
  }

  searchStations(currentPosition.lat, currentPosition.lon);
}

function toggleFavorite(stationId) {
  const btn = document.getElementById(`fav-${stationId}`);
  if (!btn) return;

  const icon = btn.querySelector("i");
  if (!icon) return;

  if (icon.classList.contains("far")) {
    icon.classList.remove("far");
    icon.classList.add("fas");
    btn.classList.add("text-red-400");
    showToast("Ajouté aux favoris", "success");
  } else {
    icon.classList.remove("fas");
    icon.classList.add("far");
    btn.classList.remove("text-red-400");
    showToast("Retiré des favoris", "info");
  }
}

function showToast(message, type = "info") {
  const toast = document.getElementById("toast");
  const icon = document.getElementById("toastIcon");
  const text = document.getElementById("toastMessage");

  text.textContent = message;

  if (icon) {
    if (type === "success") {
      icon.className = "fas fa-check-circle toast-icon";
      icon.style.color = "var(--green)";
    } else if (type === "error") {
      icon.className = "fas fa-exclamation-circle toast-icon";
      icon.style.color = "var(--red)";
    } else {
      icon.className = "fas fa-info-circle toast-icon";
      icon.style.color = "var(--blue)";
    }
  }

  toast.classList.add("show");
  clearTimeout(showToast._timer);
  showToast._timer = setTimeout(() => {
    toast.classList.remove("show");
  }, 3000);
}
</script>
