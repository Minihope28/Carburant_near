<body>

  <!-- Toast -->

  <div id="toast" class="toast flex items-center gap-3">
    <i class="fas fa-info-circle toast-icon" id="toastIcon"></i>
    <span id="toastMessage" class="toast-text">Message</span>
  </div>

  <!-- Autocomplete portal (positionné en fixed par JS) -->

  <div id="suggestionsPortal" class="suggestions-portal hidden"></div>

  <!-- Header -->

  <header class="app-header">
    <div class="header-inner">
      <div class="brand">
        <div class="brand-mark">
          <i class="fas fa-gas-pump"></i>
        </div>
        <div class="brand-text">
          <span class="brand-name">FuelFinder</span>
          <span class="brand-sub">Stations en France</span>
        </div>
      </div>
      <button onclick="refreshData()" class="btn-refresh" id="refreshBtn" aria-label="Rafraîchir">
        <i class="fas fa-sync-alt"></i>
      </button>
    </div>
  </header>

  <main class="app-main">

```
<!-- LEFT: Controls -->
<aside class="panel-controls">

  <!-- Location — IMPORTANT: garde .autocomplete-container pour app.js -->
  <section class="ctrl-card">
    <div class="ctrl-header">
      <span class="ctrl-label">Localisation</span>
      <button class="text-link" onclick="useMyLocation()">
        <i class="fas fa-location-arrow"></i> Ma position
      </button>
    </div>

    <!-- .autocomplete-container requis par app.js (click outside detection) -->
    <div class="autocomplete-container">
      <div class="search-shell">
        <i class="fas fa-search search-icon"></i>
        <input
          type="text"
          id="addressInput"
          placeholder="Ex: Antibes, Nice, 10 rue..."
          class="search-input"
          autocomplete="off"
        />
        <button onclick="searchAddress()" class="search-btn">Chercher</button>
      </div>
      <!-- suggestionsList requis par app.js mais le portal fixed est utilisé -->
      <div id="suggestionsList"></div>
    </div>

    <div id="currentLocationDisplay" class="current-location hidden">
      <i class="fas fa-map-pin"></i>
      <span id="currentLocationText"></span>
    </div>
  </section>

  <!-- Radius -->
  <section class="ctrl-card">
    <div class="ctrl-header">
      <span class="ctrl-label">Rayon</span>
      <span class="value-pill" id="radiusValue">5 km</span>
    </div>
    <input type="range" id="radiusSlider" min="1" max="10" value="5" step="0.5"
      class="range-input"
      oninput="updateRadius(this.value)" onchange="onRadiusChange()" />
    <div class="range-labels">
      <span>1 km</span><span>5 km</span><span>10 km</span>
    </div>
  </section>

  <!-- Fuel -->
  <section class="ctrl-card">
    <div class="ctrl-header">
      <span class="ctrl-label">Carburant</span>
    </div>
    <div class="segment-grid fuel-grid">
      <button onclick="selectFuel('E10')" class="segment-btn active" data-fuel="E10">
        <span class="segment-title">SP95-E10</span>
        <span class="segment-subtitle">Sans plomb 95</span>
      </button>
      <button onclick="selectFuel('SP98')" class="segment-btn" data-fuel="SP98">
        <span class="segment-title">SP98</span>
        <span class="segment-subtitle">Sans plomb 98</span>
      </button>
      <button onclick="selectFuel('Gazole')" class="segment-btn" data-fuel="Gazole">
        <span class="segment-title">Gazole</span>
        <span class="segment-subtitle">Diesel</span>
      </button>
    </div>
  </section>

  <!-- Sort -->
  <section class="ctrl-card">
    <div class="ctrl-header">
      <span class="ctrl-label">Trier par</span>
    </div>
    <div class="segment-grid sort-grid">
      <button onclick="setSort('distance')" class="segment-btn segment-btn-sm active" data-sort="distance">
        <i class="fas fa-route"></i>
        <span>Distance</span>
      </button>
      <button onclick="setSort('price')" class="segment-btn segment-btn-sm" data-sort="price">
        <i class="fas fa-euro-sign"></i>
        <span>Prix</span>
      </button>
      <button onclick="setSort('both')" class="segment-btn segment-btn-sm" data-sort="both">
        <i class="fas fa-balance-scale"></i>
        <span>Mix</span>
      </button>
    </div>
  </section>

</aside>

<!-- RIGHT: Results -->
<section class="panel-results">

  <!-- Summary -->
  <div class="summary-card">
    <div class="summary-top">
      <div class="summary-left">
        <span class="status-dot" id="statusDot"></span>
        <div>
          <p class="summary-kicker">Recherche</p>
          <h2 class="summary-title">Stations trouvées</h2>
        </div>
      </div>
      <span class="count-badge" id="stationCount">En attente</span>
    </div>
    <div class="summary-metrics">
      <div class="metric-box">
        <span class="metric-label">Meilleur prix</span>
        <span class="metric-value metric-amber" id="bestPriceValue">—</span>
      </div>
      <div class="metric-sep"></div>
      <div class="metric-box">
        <span class="metric-label">Plus proche</span>
        <span class="metric-value" id="closestValue">—</span>
      </div>
      <div class="metric-sep"></div>
      <div class="metric-box">
        <span class="metric-label">Carburant</span>
        <span class="metric-value" id="fuelValue">SP95-E10</span>
      </div>
    </div>
  </div>

  <!-- Stations list -->
  <div id="stationsList" class="stations-list">
    <div class="empty-state">
      <div class="empty-icon"><i class="fas fa-map-marked-alt"></i></div>
      <p class="empty-title">Entrez une adresse en France pour commencer</p>
      <p class="empty-sub">Distance + prix en temps réel</p>
    </div>
  </div>

</section>
