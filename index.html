<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  />
  <meta name="theme-color" content="#0f172a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>FuelFinder France</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
  />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="antialiased">
  <div id="toast" class="toast flex items-center gap-3">
    <i class="fas fa-info-circle text-blue-400 text-xl"></i>
    <span id="toastMessage" class="text-sm font-medium">Message</span>
  </div>

  <div id="suggestionsPortal" class="suggestions-portal hidden"></div>

  <header class="app-header glass">
    <div class="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3 min-w-0">
        <div class="brand-icon">
          <i class="fas fa-gas-pump text-white text-lg"></i>
        </div>
        <div class="min-w-0">
          <h1 class="font-bold text-2xl leading-tight tracking-tight">FuelFinder</h1>
          <p class="text-sm text-gray-400">Stations en France</p>
        </div>
      </div>

      <button
        onclick="refreshData()"
        class="refresh-btn"
        id="refreshBtn"
        aria-label="Rafraîchir"
      >
        <i class="fas fa-sync-alt"></i>
      </button>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-4 pt-24 pb-8 app-layout">
    <aside class="controls-panel space-y-4">
      <section class="glass-card control-card location-section">
        <div class="section-head">
          <h2>Localisation</h2>
          <button class="mini-link" onclick="useMyLocation()">
            <i class="fas fa-location-arrow"></i>
            Ma position
          </button>
        </div>

        <div class="autocomplete-container">
          <div class="search-shell">
            <i class="fas fa-search search-icon"></i>
            <input
              type="text"
              id="addressInput"
              placeholder="Ex: Antibes, Nice, 10 rue..."
              class="search-input"
              autocomplete="off"
            />
            <button onclick="searchAddress()" class="search-btn">
              Rechercher
            </button>
          </div>

          <div id="suggestionsList" class="suggestions-list"></div>
        </div>

        <div id="currentLocationDisplay" class="current-location hidden">
          <i class="fas fa-map-marker-alt"></i>
          <span id="currentLocationText"></span>
        </div>
      </section>

      <section class="glass-card control-card compact-card">
        <div class="compact-head">
          <h2>Rayon</h2>
          <span class="value-pill" id="radiusValue">5 km</span>
        </div>

        <input
          type="range"
          id="radiusSlider"
          min="1"
          max="10"
          value="5"
          step="0.5"
          class="w-full"
          oninput="updateRadius(this.value)"
          onchange="onRadiusChange()"
        />

        <div class="range-labels">
          <span>1 km</span>
          <span>5 km</span>
          <span>10 km</span>
        </div>
      </section>

      <section class="glass-card control-card compact-card">
        <div class="compact-head">
          <h2>Carburant</h2>
        </div>

        <div class="segment-grid fuel-grid">
          <button
            onclick="selectFuel('E10')"
            class="segment-btn active"
            data-fuel="E10"
          >
            <span class="segment-title">SP95-E10</span>
            <span class="segment-subtitle">Sans plomb 95</span>
          </button>

          <button
            onclick="selectFuel('SP98')"
            class="segment-btn"
            data-fuel="SP98"
          >
            <span class="segment-title">SP98</span>
            <span class="segment-subtitle">Sans plomb 98</span>
          </button>

          <button
            onclick="selectFuel('Gazole')"
            class="segment-btn"
            data-fuel="Gazole"
          >
            <span class="segment-title">Gazole</span>
            <span class="segment-subtitle">Diesel</span>
          </button>
        </div>
      </section>

      <section class="glass-card control-card compact-card">
        <div class="compact-head">
          <h2>Trier par</h2>
        </div>

        <div class="segment-grid sort-grid">
          <button
            onclick="setSort('distance')"
            class="segment-btn active segment-btn-sm"
            data-sort="distance"
          >
            <i class="fas fa-route"></i>
            <span>Distance</span>
          </button>

          <button
            onclick="setSort('price')"
            class="segment-btn segment-btn-sm"
            data-sort="price"
          >
            <i class="fas fa-euro-sign"></i>
            <span>Prix</span>
          </button>

          <button
            onclick="setSort('both')"
            class="segment-btn segment-btn-sm"
            data-sort="both"
          >
            <i class="fas fa-balance-scale"></i>
            <span>Mix</span>
          </button>
        </div>
      </section>
    </aside>

    <section class="results-panel space-y-4 pb-6">
      <section class="glass-card summary-card">
        <div class="summary-top">
          <div>
            <p class="summary-kicker">Recherche</p>
            <h2 class="summary-title">Stations trouvées</h2>
          </div>
          <div class="summary-count-wrap">
            <span class="status-dot"></span>
            <span id="stationCount" class="summary-count">En attente</span>
          </div>
        </div>

        <div class="summary-metrics">
          <div class="metric-box">
            <span class="metric-label">Meilleur prix</span>
            <span class="metric-value" id="bestPriceValue">—</span>
          </div>
          <div class="metric-box">
            <span class="metric-label">Plus proche</span>
            <span class="metric-value" id="closestValue">—</span>
          </div>
          <div class="metric-box">
            <span class="metric-label">Carburant</span>
            <span class="metric-value" id="fuelValue">SP95-E10</span>
          </div>
        </div>
      </section>

      <div id="stationsList" class="space-y-3">
        <div class="glass-card empty-state">
          <i class="fas fa-map-marker-alt empty-icon"></i>
          <p class="empty-title">Entrez une adresse en France pour commencer</p>
          <p class="empty-subtitle">Distance + prix</p>
        </div>
      </div>
    </section>
  </main>

  <nav class="bottom-nav mobile-only">
    <div class="max-w-lg mx-auto flex justify-around items-center text-gray-400">
      <div class="nav-item nav-item-active">
        <i class="fas fa-search text-xl"></i>
        <span class="text-xs">Rechercher</span>
      </div>
      <div class="nav-item">
        <i class="fas fa-heart text-xl"></i>
        <span class="text-xs">Favoris</span>
      </div>
      <div class="nav-item">
        <i class="fas fa-cog text-xl"></i>
        <span class="text-xs">Paramètres</span>
      </div>
    </div>
  </nav>

  <script src="app.js"></script>
</body>
</html>
