<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>FuelFinder France</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: #0f172a; color: #e2e8f0; overflow-x: hidden; padding-bottom: 80px; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .glass-card { background: linear-gradient(135deg, rgba(30, 41, 59, 0.8), rgba(15, 23, 42, 0.9)); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.08); }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .animate-slide-up { animation: slideUp 0.4s ease-out forwards; }
        .fuel-btn { transition: all 0.3s ease; }
        .fuel-btn.active { background: linear-gradient(135deg, #3b82f6, #2563eb); box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4); transform: translateY(-2px); }
        .station-card { transition: all 0.3s ease; border-left: 3px solid transparent; }
        .station-card:hover { transform: translateX(5px); border-left-color: #3b82f6; }
        .price-tag { background: linear-gradient(135deg, #10b981, #059669); box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3); }
        .price-tag.expensive { background: linear-gradient(135deg, #ef4444, #dc2626); }
        .price-tag.medium { background: linear-gradient(135deg, #f59e0b, #d97706); }
        .spinner { border: 3px solid rgba(255,255,255,0.1); border-left-color: #3b82f6; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        input[type=range] { -webkit-appearance: none; background: transparent; width: 100%; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 20px; width: 20px; border-radius: 50%; background: #3b82f6; cursor: pointer; margin-top: -8px; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 4px; background: #334155; border-radius: 2px; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(20px); border-top: 1px solid rgba(255,255,255,0.1); z-index: 1000; padding-bottom: env(safe-area-inset-bottom); }
        .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px); background: rgba(30, 41, 59, 0.95); backdrop-filter: blur(10px); padding: 16px 24px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); z-index: 9999; transition: transform 0.3s ease; }
        .toast.show { transform: translateX(-50%) translateY(0); }
        .sort-btn { transition: all 0.2s; }
        .sort-btn.active { background: rgba(59, 130, 246, 0.3); color: #60a5fa; border-color: #3b82f6; }
        
        /* 🔥 NOUVEAU: Styles pour l'autocomplétion */
        .autocomplete-container { position: relative; width: 100%; }
        .suggestions-list {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: rgba(30, 41, 59, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-top: none;
            border-radius: 0 0 12px 12px;
            max-height: 200px;
            overflow-y: auto;
            z-index: 100;
            display: none;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        .suggestions-list.show { display: block; }
        .suggestion-item {
            padding: 12px 16px;
            cursor: pointer;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .suggestion-item:hover { background: rgba(59, 130, 246, 0.2); }
        .suggestion-item:last-child { border-bottom: none; }
        .suggestion-icon { color: #3b82f6; font-size: 14px; }
        .suggestion-text { font-size: 14px; color: #e2e8f0; }
        .suggestion-context { font-size: 12px; color: #64748b; margin-left: 24px; }
        
        /* Responsive */
        @media (max-width: 640px) {
            .suggestions-list { max-height: 250px; }
        }
    </style>
</head>
<body class="antialiased">
    <div id="toast" class="toast flex items-center gap-3">
        <i class="fas fa-info-circle text-blue-400 text-xl"></i>
        <span id="toastMessage" class="text-sm font-medium">Message</span>
    </div>

    <header class="fixed top-0 left-0 right-0 z-50 glass border-b border-white/10">
        <div class="max-w-lg mx-auto px-4 py-4 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-blue-500 to-blue-600 flex items-center justify-center shadow-lg shadow-blue-500/30">
                    <i class="fas fa-gas-pump text-white text-lg"></i>
                </div>
                <div>
                    <h1 class="font-bold text-lg leading-tight">FuelFinder</h1>
                    <p class="text-xs text-gray-400">France • Temps réel</p>
                </div>
            </div>
            <button onclick="refreshData()" class="w-10 h-10 rounded-full bg-white/5 flex items-center justify-center hover:bg-white/10 transition-colors" id="refreshBtn">
                <i class="fas fa-sync-alt text-gray-300"></i>
            </button>
        </div>
    </header>

    <main class="max-w-lg mx-auto px-4 pt-24 space-y-6">
        <!-- Localisation avec autocomplétion -->
        <section class="glass-card rounded-2xl p-4 space-y-4">
            <div class="flex items-center justify-between mb-2">
                <h2 class="font-semibold text-sm text-gray-300 uppercase tracking-wider">Localisation</h2>
                <span class="text-xs text-blue-400 cursor-pointer hover:text-blue-300" onclick="useMyLocation()">
                    <i class="fas fa-location-arrow mr-1"></i>Ma position
                </span>
            </div>
            
            <!-- 🔥 NOUVEAU: Conteneur autocomplétion -->
            <div class="autocomplete-container">
                <div class="relative">
                    <input type="text" id="addressInput" placeholder="Entrez une adresse en France..." 
                        class="w-full bg-slate-800/50 border border-slate-700 rounded-xl px-4 py-3 pl-12 text-sm focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 transition-all placeholder-gray-500"
                        autocomplete="off">
                    <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-500"></i>
                    <button onclick="searchAddress()" class="absolute right-2 top-1/2 -translate-y-1/2 bg-blue-600 hover:bg-blue-500 text-white px-4 py-1.5 rounded-lg text-xs font-medium transition-colors">
                        Rechercher
                    </button>
                </div>
                <!-- Liste des suggestions -->
                <div id="suggestionsList" class="suggestions-list"></div>
            </div>
            
            <!-- Adresse actuelle sélectionnée -->
            <div id="currentLocationDisplay" class="hidden text-xs text-blue-300 bg-blue-500/10 p-2 rounded-lg flex items-center gap-2">
                <i class="fas fa-map-marker-alt"></i>
                <span id="currentLocationText"></span>
            </div>
        </section>

        <!-- Rayon avec MAJ auto -->
        <section class="glass-card rounded-2xl p-4">
            <div class="flex items-center justify-between mb-3">
                <h2 class="font-semibold text-sm text-gray-300 uppercase tracking-wider">Rayon de recherche</h2>
                <span class="text-blue-400 font-bold" id="radiusValue">5 km</span>
            </div>
            <input type="range" id="radiusSlider" min="1" max="10" value="5" step="0.5" 
                class="w-full" 
                oninput="updateRadius(this.value)" 
                onchange="onRadiusChange()">
            <div class="flex justify-between text-xs text-gray-500 mt-2">
                <span>1 km</span>
                <span>5 km</span>
                <span>10 km</span>
            </div>
        </section>

        <!-- Type de carburant -->
        <section class="glass-card rounded-2xl p-4">
            <h2 class="font-semibold text-sm text-gray-300 uppercase tracking-wider mb-3">Carburant</h2>
            <div class="grid grid-cols-3 gap-2">
                <button onclick="selectFuel('E10')" class="fuel-btn active bg-slate-800/50 border border-slate-700 rounded-xl p-3 text-center" data-fuel="E10">
                    <div class="text-lg font-bold mb-1">SP95-E10</div>
                    <div class="text-xs text-gray-400">Sans Plomb 95</div>
                </button>
                <button onclick="selectFuel('SP98')" class="fuel-btn bg-slate-800/50 border border-slate-700 rounded-xl p-3 text-center" data-fuel="SP98">
                    <div class="text-lg font-bold mb-1">SP98</div>
                    <div class="text-xs text-gray-400">Sans Plomb 98</div>
                </button>
                <button onclick="selectFuel('Gazole')" class="fuel-btn bg-slate-800/50 border border-slate-700 rounded-xl p-3 text-center" data-fuel="Gazole">
                    <div class="text-lg font-bold mb-1">Diesel</div>
                    <div class="text-xs text-gray-400">Gazole B7</div>
                </button>
            </div>
        </section>

        <!-- Tri -->
        <section class="glass-card rounded-2xl p-4">
            <h2 class="font-semibold text-sm text-gray-300 uppercase tracking-wider mb-3">Trier par</h2>
            <div class="grid grid-cols-3 gap-2">
                <button onclick="setSort('distance')" class="sort-btn active bg-slate-800/50 border border-slate-700 rounded-xl p-3 text-center text-sm" data-sort="distance">
                    <i class="fas fa-route mb-1 block"></i>
                    Distance
                </button>
                <button onclick="setSort('price')" class="sort-btn bg-slate-800/50 border border-slate-700 rounded-xl p-3 text-center text-sm" data-sort="price">
                    <i class="fas fa-euro-sign mb-1 block"></i>
                    Prix
                </button>
                <button onclick="setSort('both')" class="sort-btn bg-slate-800/50 border border-slate-700 rounded-xl p-3 text-center text-sm" data-sort="both">
                    <i class="fas fa-balance-scale mb-1 block"></i>
                    Les deux
                </button>
            </div>
        </section>

        <!-- Résultats -->
        <section class="space-y-3 pb-6">
            <div class="flex items-center justify-between">
                <h2 class="font-semibold text-sm text-gray-300 uppercase tracking-wider">Stations trouvées</h2>
                <div class="flex items-center gap-2 text-xs">
                    <span class="w-2 h-2 rounded-full bg-green-500"></span>
                    <span class="text-gray-400" id="stationCount">0 station</span>
                </div>
            </div>
            <div id="stationsList" class="space-y-3">
                <div class="glass-card rounded-2xl p-8 text-center">
                    <div class="spinner mx-auto mb-4"></div>
                    <p class="text-gray-400 text-sm">Recherche en cours...</p>
                </div>
            </div>
        </section>
    </main>

    <nav class="bottom-nav px-6 py-3">
        <div class="max-w-lg mx-auto flex justify-around items-center text-gray-400">
            <div class="flex flex-col items-center gap-1 text-blue-400">
                <i class="fas fa-search text-xl"></i>
                <span class="text-xs">Rechercher</span>
            </div>
            <div class="flex flex-col items-center gap-1">
                <i class="fas fa-heart text-xl"></i>
                <span class="text-xs">Favoris</span>
            </div>
            <div class="flex flex-col items-center gap-1">
                <i class="fas fa-cog text-xl"></i>
                <span class="text-xs">Paramètres</span>
            </div>
        </div>
    </nav>

    <script>
        const CONFIG = {
            apiUrl: 'https://www.prix-carburants.2aaz.fr/api/stations/around',
            geocodeUrl: 'https://api-adresse.data.gouv.fr/search/',
            // 🔥 NOUVEAU: Endpoint autocomplétion
            autocompleteUrl: 'https://api-adresse.data.gouv.fr/search/',
            defaultLat: 48.8566,
            defaultLon: 2.3522,
            radius: 5,
            selectedFuel: 'E10',
            sortBy: 'distance'
        };

        let stations = [], currentPosition = { lat: CONFIG.defaultLat, lon: CONFIG.defaultLon };
        let debounceTimer;

        document.addEventListener('DOMContentLoaded', () => {
            // Initialiser avec Paris par défaut mais montrer qu'il faut chercher
            document.getElementById('addressInput').placeholder = "Ex: 18bis Rue Bricka, Antibes...";
            searchStations(CONFIG.defaultLat, CONFIG.defaultLon);
            
            // 🔥 NOUVEAU: Event listeners pour autocomplétion
            setupAutocomplete();
        });

        // 🔥 NOUVEAU: Setup autocomplétion
        function setupAutocomplete() {
            const input = document.getElementById('addressInput');
            const suggestionsList = document.getElementById('suggestionsList');
            
            // Quand on tape
            input.addEventListener('input', (e) => {
                const query = e.target.value.trim();
                
                // Cacher les suggestions si moins de 3 caractères
                if (query.length < 3) {
                    suggestionsList.classList.remove('show');
                    return;
                }
                
                // Debounce pour éviter trop d'appels
                clearTimeout(debounceTimer);
                debounceTimer = setTimeout(() => fetchSuggestions(query), 300);
            });
            
            // Cacher suggestions quand on clique ailleurs
            document.addEventListener('click', (e) => {
                if (!e.target.closest('.autocomplete-container')) {
                    suggestionsList.classList.remove('show');
                }
            });
            
            // Gérer la touche Entrée
            input.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    suggestionsList.classList.remove('show');
                    searchAddress();
                }
            });
        }

        // 🔥 NOUVEAU: Récupérer les suggestions
        async function fetchSuggestions(query) {
            try {
                const url = `${CONFIG.autocompleteUrl}?q=${encodeURIComponent(query)}&limit=5&autocomplete=1`;
                const response = await fetch(url);
                const data = await response.json();
                
                displaySuggestions(data.features || []);
            } catch (error) {
                console.error('Erreur autocomplétion:', error);
            }
        }

        // 🔥 NOUVEAU: Afficher les suggestions
        function displaySuggestions(suggestions) {
            const suggestionsList = document.getElementById('suggestionsList');
            
            if (suggestions.length === 0) {
                suggestionsList.classList.remove('show');
                return;
            }
            
            suggestionsList.innerHTML = suggestions.map(feature => {
                const label = feature.properties.label;
                const context = feature.properties.context; // Département, région
                const type = feature.properties.type; // housenumber, street, locality
                
                let icon = 'fa-map-marker-alt';
                if (type === 'housenumber') icon = 'fa-home';
                else if (type === 'street') icon = 'fa-road';
                else if (type === 'locality') icon = 'fa-city';
                
                // Stocker les coordonnées dans data attributes
                const coords = feature.geometry.coordinates; // [lon, lat]
                
                return `
                    <div class="suggestion-item" onclick="selectSuggestion('${label}', ${coords[1]}, ${coords[0]})">
                        <i class="fas ${icon} suggestion-icon"></i>
                        <div style="flex: 1;">
                            <div class="suggestion-text">${highlightMatch(label, document.getElementById('addressInput').value)}</div>
                            <div class="suggestion-context">${context}</div>
                        </div>
                    </div>
                `;
            }).join('');
            
            suggestionsList.classList.add('show');
        }

        // 🔥 NOUVEAU: Surligner la correspondance
        function highlightMatch(text, query) {
            const regex = new RegExp(`(${query})`, 'gi');
            return text.replace(regex, '<span style="color: #3b82f6; font-weight: 600;">$1</span>');
        }

        // 🔥 NOUVEAU: Sélectionner une suggestion
        async function selectSuggestion(label, lat, lon) {
            const input = document.getElementById('addressInput');
            const suggestionsList = document.getElementById('suggestionsList');
            
            input.value = label;
            suggestionsList.classList.remove('show');
            
            // 🔥 CORRECTION IMPORTANTE: Mettre à jour la position AVANT de chercher
            currentPosition = { lat: parseFloat(lat), lon: parseFloat(lon) };
            
            // Afficher la position actuelle
            document.getElementById('currentLocationText').textContent = label;
            document.getElementById('currentLocationDisplay').classList.remove('hidden');
            
            // Rechercher les stations
            showToast(`Recherche à ${label}...`, 'info');
            await searchStations(currentPosition.lat, currentPosition.lon);
        }

        function updateRadius(value) {
            CONFIG.radius = parseFloat(value);
            document.getElementById('radiusValue').textContent = value + ' km';
        }

        function onRadiusChange() {
            if (currentPosition) {
                searchStations(currentPosition.lat, currentPosition.lon);
            }
        }

        function selectFuel(fuel) {
            CONFIG.selectedFuel = fuel;
            document.querySelectorAll('.fuel-btn').forEach(btn => {
                btn.classList.remove('active');
                if(btn.dataset.fuel === fuel) btn.classList.add('active');
            });
            if (currentPosition) searchStations(currentPosition.lat, currentPosition.lon);
        }

        function setSort(sortType) {
            CONFIG.sortBy = sortType;
            document.querySelectorAll('.sort-btn').forEach(btn => {
                btn.classList.remove('active');
                if(btn.dataset.sort === sortType) btn.classList.add('active');
            });
            sortAndDisplayStations();
        }

        function useMyLocation() {
            if (!navigator.geolocation) {
                showToast('Géolocalisation non supportée', 'error');
                return;
            }
            showToast('Recherche de votre position...', 'info');
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    const { latitude, longitude } = position.coords;
                    
                    // 🔥 CORRECTION: Mettre à jour currentPosition
                    currentPosition = { lat: latitude, lon: longitude };
                    
                    // Obtenir l'adresse approximative
                    fetch(`${CONFIG.geocodeUrl}?q=${latitude}+${longitude}&limit=1`)
                        .then(res => res.json())
                        .then(data => {
                            if (data.features && data.features.length > 0) {
                                const address = data.features[0].properties.label;
                                document.getElementById('addressInput').value = address;
                                document.getElementById('currentLocationText').textContent = address;
                                document.getElementById('currentLocationDisplay').classList.remove('hidden');
                            }
                        });
                    
                    searchStations(latitude, longitude);
                    showToast('Position trouvée !', 'success');
                },
                () => showToast('Impossible d\'obtenir la position', 'error')
            );
        }

        // 🔥 CORRECTION: Fonction searchAddress corrigée
        async function searchAddress() {
            const query = document.getElementById('addressInput').value.trim();
            if (!query) {
                showToast('Entrez une adresse', 'error');
                return;
            }
            
            // Cacher les suggestions
            document.getElementById('suggestionsList').classList.remove('show');
            
            showToast('Recherche de l\'adresse...', 'info');
            
            try {
                const response = await fetch(`${CONFIG.geocodeUrl}?q=${encodeURIComponent(query)}&limit=1`);
                const data = await response.json();
                
                if (data.features && data.features.length > 0) {
                    const feature = data.features[0];
                    const [lon, lat] = feature.geometry.coordinates;
                    const address = feature.properties.label;
                    
                    // 🔥 CORRECTION CRUCIALE: Mettre à jour currentPosition avec parseFloat
                    currentPosition = { 
                        lat: parseFloat(lat), 
                        lon: parseFloat(lon) 
                    };
                    
                    // Mettre à jour l'input avec l'adresse formatée
                    document.getElementById('addressInput').value = address;
                    
                    // Afficher la position actuelle
                    document.getElementById('currentLocationText').textContent = address;
                    document.getElementById('currentLocationDisplay').classList.remove('hidden');
                    
                    showToast(`Position: ${address}`, 'success');
                    
                    // Rechercher les stations avec les NOUVELLES coordonnées
                    await searchStations(currentPosition.lat, currentPosition.lon);
                } else {
                    showToast('Adresse non trouvée', 'error');
                }
            } catch (error) {
                console.error('Erreur:', error);
                showToast('Erreur de recherche', 'error');
            }
        }

        async function searchStations(lat, lon) {
            console.log('Recherche stations à:', lat, lon, 'Rayon:', CONFIG.radius); // Debug
            
            document.getElementById('stationsList').innerHTML = `
                <div class="glass-card rounded-2xl p-8 text-center">
                    <div class="spinner mx-auto mb-4"></div>
                    <p class="text-gray-400 text-sm">Recherche dans un rayon de ${CONFIG.radius} km...</p>
                    <p class="text-xs text-gray-500 mt-2">${lat.toFixed(4)}, ${lon.toFixed(4)}</p>
                </div>
            `;
            
            try {
                const url = `${CONFIG.apiUrl}?lat=${lat}&lng=${lon}&radius=${CONFIG.radius * 1000}&fuel=${CONFIG.selectedFuel}`;
                console.log('URL API:', url); // Debug
                
                const response = await fetch(url);
                
                if (!response.ok) {
                    throw new Error('API Error: ' + response.status);
                }
                
                const data = await response.json();
                console.log('Données reçues:', data.length, 'stations'); // Debug
                
                if (data && Array.isArray(data) && data.length > 0) {
                    processStations(data, lat, lon);
                } else {
                    throw new Error('Aucune station trouvée');
                }
            } catch (error) {
                console.error('API Error:', error);
                showToast('Mode démo: données simulées', 'info');
                loadDemoData(lat, lon);
            }
        }

        function processStations(results, userLat, userLon) {
            stations = results.map(station => {
                const price = station.prix?.[CONFIG.selectedFuel] || station[CONFIG.selectedFuel.toLowerCase()] || null;
                
                if (!price) return null;
                
                const stationLat = parseFloat(station.latitude || station.lat);
                const stationLon = parseFloat(station.longitude || station.lng || station.lon);
                
                if (isNaN(stationLat) || isNaN(stationLon)) return null;
                
                const distance = calculateDistance(userLat, userLon, stationLat, stationLon);
                
                if (distance > CONFIG.radius) return null;
                
                return {
                    id: station.id || Math.random().toString(36),
                    brand: station.enseigne || station.brand || 'Indépendant',
                    address: `${station.adresse || station.address || ''}, ${station.cp || station.postal_code || ''} ${station.ville || station.city || ''}`.trim(),
                    lat: stationLat,
                    lon: stationLon,
                    price: parseFloat(price),
                    distance: distance,
                    fuel: CONFIG.selectedFuel,
                    updateTime: station.maj || station.updated_at || new Date().toISOString()
                };
            }).filter(s => s !== null);
            
            if (stations.length === 0) {
                loadDemoData(userLat, userLon);
                return;
            }
            
            sortAndDisplayStations();
        }

        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Math.sin(dLon/2) * Math.sin(dLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return Math.round(R * c * 100) / 100;
        }

        function sortAndDisplayStations() {
            if (CONFIG.sortBy === 'distance') {
                stations.sort((a, b) => a.distance - b.distance);
            } else if (CONFIG.sortBy === 'price') {
                stations.sort((a, b) => a.price - b.price);
            } else if (CONFIG.sortBy === 'both') {
                const maxDist = Math.max(...stations.map(s => s.distance), 0.1);
                const minPrice = Math.min(...stations.map(s => s.price));
                const maxPrice = Math.max(...stations.map(s => s.price));
                const priceRange = maxPrice - minPrice || 1;
                
                stations.forEach(s => {
                    const priceScore = (s.price - minPrice) / priceRange;
                    const distScore = s.distance / maxDist;
                    s.score = (priceScore * 0.6) + (distScore * 0.4);
                });
                stations.sort((a, b) => a.score - b.score);
            }
            
            updateUI();
        }

        function updateUI() {
            document.getElementById('stationCount').textContent = `${stations.length} station${stations.length > 1 ? 's' : ''}`;
            
            if (stations.length === 0) {
                document.getElementById('stationsList').innerHTML = `
                    <div class="glass-card rounded-2xl p-8 text-center text-gray-400">
                        <i class="fas fa-gas-pump text-4xl mb-3 opacity-30"></i>
                        <p>Aucune station trouvée dans un rayon de ${CONFIG.radius} km</p>
                    </div>
                `;
                return;
            }
            
            const cheapestPrice = Math.min(...stations.map(s => s.price));
            const closestDist = Math.min(...stations.map(s => s.distance));
            
            document.getElementById('stationsList').innerHTML = stations.slice(0, 15).map((station, index) => {
                const isCheapest = station.price === cheapestPrice;
                const isClosest = station.distance === closestDist;
                const priceClass = isCheapest ? '' : (station.price > cheapestPrice * 1.03 ? 'expensive' : 'medium');
                
                let badges = '';
                if (isCheapest) badges += '<span class="bg-green-500/20 text-green-400 text-xs px-2 py-0.5 rounded-full ml-2">Meilleur prix</span>';
                if (isClosest) badges += '<span class="bg-blue-500/20 text-blue-400 text-xs px-2 py-0.5 rounded-full ml-2">Plus proche</span>';
                
                const mapsUrl = `https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(station.address)}&travelmode=driving`;
                
                return `
                    <div class="station-card glass-card rounded-2xl p-4 animate-slide-up" style="animation-delay:${index*0.05}s">
                        <div class="flex items-start justify-between gap-3">
                            <div class="flex-1 min-w-0">
                                <div class="flex items-center flex-wrap gap-1 mb-1">
                                    <h3 class="font-semibold text-white truncate">${station.brand}</h3>
                                    ${badges}
                                </div>
                                <p class="text-sm text-gray-400 mb-2 line-clamp-2">${station.address}</p>
                                <div class="flex items-center gap-4 text-xs text-gray-500">
                                    <span class="flex items-center gap-1">
                                        <i class="fas fa-map-marker-alt text-blue-400"></i>
                                        <span class="font-medium text-blue-300">${station.distance.toFixed(1)} km</span>
                                    </span>
                                </div>
                            </div>
                            <div class="text-right flex flex-col items-end">
                                <div class="price-tag ${priceClass} text-white px-3 py-2 rounded-xl font-bold text-lg mb-1">
                                    ${station.price.toFixed(2)}€
                                </div>
                                ${!isCheapest ? `<div class="text-xs text-gray-500">+${((station.price - cheapestPrice) * 100).toFixed(0)}c</div>` : '<div class="text-xs text-green-400 font-medium">Meilleur prix</div>'}
                            </div>
                        </div>
                        <div class="mt-3 pt-3 border-t border-white/5 flex items-center justify-between">
                            <a href="${mapsUrl}" target="_blank" class="text-blue-400 text-sm hover:text-blue-300 flex items-center gap-2 transition-colors">
                                <i class="fas fa-directions"></i>
                                Itinéraire
                            </a>
                            <button onclick="toggleFavorite('${station.id}')" class="text-gray-500 hover:text-red-400 transition-colors p-2" id="fav-${station.id}">
                                <i class="far fa-heart text-lg"></i>
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function loadDemoData(lat, lon) {
            const brands = ['TotalEnergies', 'Shell', 'Carrefour', 'Leclerc', 'Avia', 'Intermarché', 'BP'];
            
            stations = Array.from({length: 8}, (_, i) => {
                const angle = (i / 8) * Math.PI * 2;
                const dist = (Math.random() * CONFIG.radius * 0.9) + 0.5;
                const basePrice = CONFIG.selectedFuel === 'Gazole' ? 1.65 : (CONFIG.selectedFuel === 'SP98' ? 1.85 : 1.75);
                
                const stationLat = lat + (dist / 111) * Math.cos(angle);
                const stationLon = lon + (dist / (111 * Math.cos(lat * Math.PI / 180))) * Math.sin(angle);
                
                return {
                    id: `demo-${i}`,
                    brand: brands[i % brands.length],
                    address: `${Math.floor(Math.random()*200)+1} Rue de la Station, ${Math.floor(Math.random()*95000)+1000} Ville`,
                    lat: stationLat,
                    lon: stationLon,
                    price: basePrice + (Math.random() - 0.5) * 0.15,
                    distance: dist,
                    fuel: CONFIG.selectedFuel,
                    updateTime: new Date().toISOString()
                };
            }).filter(s => s.distance <= CONFIG.radius);
            
            sortAndDisplayStations();
        }

        function refreshData() {
            const btn = document.getElementById('refreshBtn');
            btn.style.transform = 'rotate(360deg)';
            btn.style.transition = 'transform 1s';
            setTimeout(() => btn.style.transform = 'rotate(0deg)', 1000);
            
            if (currentPosition) searchStations(currentPosition.lat, currentPosition.lon);
        }

        function toggleFavorite(stationId) {
            const btn = document.getElementById(`fav-${stationId}`);
            const icon = btn.querySelector('i');
            
            if (icon.classList.contains('far')) {
                icon.classList.remove('far');
                icon.classList.add('fas');
                btn.classList.add('text-red-400');
                showToast('Ajouté aux favoris', 'success');
            } else {
                icon.classList.remove('fas');
                icon.classList.add('far');
                btn.classList.remove('text-red-400');
                showToast('Retiré des favoris', 'info');
            }
        }

        function showToast(message, type) {
            const toast = document.getElementById('toast');
            document.getElementById('toastMessage').textContent = message;
            toast.querySelector('i').className = `fas text-xl ${type === 'success' ? 'fa-check-circle text-green-400' : (type === 'error' ? 'fa-exclamation-circle text-red-400' : 'fa-info-circle text-blue-400')}`;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
    </script>
</body>
</html>
