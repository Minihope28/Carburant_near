<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  />
  <meta name="theme-color" content="#0f172a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>FuelFinder France</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
  />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="antialiased">
  <div id="toast" class="toast flex items-center gap-3">
    <i class="fas fa-info-circle text-blue-400 text-xl"></i>
    <span id="toastMessage" class="text-sm font-medium">Message</span>
  </div>

  <header class="fixed top-0 left-0 right-0 z-50 glass border-b border-white/10">
    <div class="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div
          class="w-11 h-11 rounded-2xl bg-gradient-to-br from-blue-500 to-blue-600 flex items-center justify-center shadow-lg shadow-blue-500/30"
        >
          <i class="fas fa-gas-pump text-white text-lg"></i>
        </div>
        <div>
          <h1 class="font-bold text-xl leading-tight">FuelFinder</h1>
          <p class="text-sm text-gray-400">Stations en France</p>
        </div>
      </div>

      <button
        onclick="refreshData()"
        class="w-12 h-12 rounded-full bg-white/5 flex items-center justify-center hover:bg-white/10 transition-colors"
        id="refreshBtn"
        aria-label="Rafraîchir"
      >
        <i class="fas fa-sync-alt text-gray-300"></i>
      </button>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-4 pt-24 pb-8 app-layout">
    <aside class="controls-panel space-y-6">
      <section class="glass-card rounded-2xl p-4 space-y-4">
        <div class="flex items-center justify-between mb-2">
          <h2 class="font-semibold text-sm text-gray-300 uppercase tracking-wider">
            Localisation
          </h2>
          <span
            class="text-xs text-blue-400 cursor-pointer hover:text-blue-300"
            onclick="useMyLocation()"
          >
            <i class="fas fa-location-arrow mr-1"></i>Ma position
          </span>
        </div>

        <div class="autocomplete-container">
          <div class="relative">
            <input
              type="text"
              id="addressInput"
              placeholder="Ex: Antibes, Nice, 10 rue..."
              class="w-full bg-slate-800/50 border border-slate-700 rounded-xl px-4 py-3 pl-12 pr-28 text-sm focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 transition-all placeholder-gray-500"
              autocomplete="off"
            />
            <i
              class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-500"
            ></i>
            <button
              onclick="searchAddress()"
              class="absolute right-2 top-1/2 -translate-y-1/2 bg-blue-600 hover:bg-blue-500 text-white px-4 py-1.5 rounded-lg text-xs font-medium transition-colors"
            >
              Rechercher
            </button>
          </div>

          <div id="suggestionsList" class="suggestions-list"></div>
        </div>

        <div
          id="currentLocationDisplay"
          class="hidden text-xs text-blue-300 bg-blue-500/10 p-2 rounded-lg flex items-center gap-2"
        >
          <i class="fas fa-map-marker-alt"></i>
          <span id="currentLocationText"></span>
        </div>
      </section>

      <section class="glass-card rounded-2xl p-4">
        <div class="flex items-center justify-between mb-3">
          <h2 class="font-semibold text-sm text-gray-300 uppercase tracking-wider">
            Rayon de recherche
          </h2>
          <span class="text-blue-400 font-bold" id="radiusValue">5 km</span>
        </div>

        <input
          type="range"
          id="radiusSlider"
          min="1"
          max="20"
          value="5"
          step="0.5"
          class="w-full"
          oninput="updateRadius(this.value)"
          onchange="onRadiusChange()"
        />

        <div class="flex justify-between text-xs text-gray-500 mt-2">
          <span>1 km</span>
          <span>10 km</span>
          <span>20 km</span>
        </div>
      </section>

      <section class="glass-card rounded-2xl p-4">
        <h2 class="font-semibold text-sm text-gray-300 uppercase tracking-wider mb-3">
          Carburant
        </h2>

        <div class="grid grid-cols-3 gap-2">
          <button
            onclick="selectFuel('E10')"
            class="fuel-btn active bg-slate-800/50 border border-slate-700 rounded-xl p-3 text-center"
            data-fuel="E10"
          >
            <div class="text-lg font-bold mb-1">SP95-E10</div>
            <div class="text-xs text-gray-400">Sans Plomb 95</div>
          </button>

          <button
            onclick="selectFuel('SP98')"
            class="fuel-btn bg-slate-800/50 border border-slate-700 rounded-xl p-3 text-center"
            data-fuel="SP98"
          >
            <div class="text-lg font-bold mb-1">SP98</div>
            <div class="text-xs text-gray-400">Sans Plomb 98</div>
          </button>

          <button
            onclick="selectFuel('Gazole')"
            class="fuel-btn bg-slate-800/50 border border-slate-700 rounded-xl p-3 text-center"
            data-fuel="Gazole"
          >
            <div class="text-lg font-bold mb-1">Diesel</div>
            <div class="text-xs text-gray-400">Gazole</div>
          </button>
        </div>
      </section>

      <section class="glass-card rounded-2xl p-4">
        <h2 class="font-semibold text-sm text-gray-300 uppercase tracking-wider mb-3">
          Trier par
        </h2>

        <div class="grid grid-cols-3 gap-2">
          <button
            onclick="setSort('distance')"
            class="sort-btn active bg-slate-800/50 border border-slate-700 rounded-xl p-3 text-center text-sm"
            data-sort="distance"
          >
            <i class="fas fa-route mb-1 block"></i>
            Distance
          </button>

          <button
            onclick="setSort('price')"
            class="sort-btn bg-slate-800/50 border border-slate-700 rounded-xl p-3 text-center text-sm"
            data-sort="price"
          >
            <i class="fas fa-euro-sign mb-1 block"></i>
            Prix
          </button>

          <button
            onclick="setSort('both')"
            class="sort-btn bg-slate-800/50 border border-slate-700 rounded-xl p-3 text-center text-sm"
            data-sort="both"
          >
            <i class="fas fa-balance-scale mb-1 block"></i>
            Les deux
          </button>
        </div>
      </section>
    </aside>

    <section class="results-panel space-y-3 pb-6">
      <div class="flex items-center justify-between">
        <h2 class="font-semibold text-sm text-gray-300 uppercase tracking-wider">
          Stations trouvées
        </h2>
        <div class="flex items-center gap-2 text-xs">
          <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
          <span class="text-gray-400" id="stationCount">En attente</span>
        </div>
      </div>

      <div id="stationsList" class="space-y-3">
        <div class="glass-card rounded-2xl p-8 text-center text-gray-400">
          <i class="fas fa-map-marker-alt text-4xl mb-3 opacity-30"></i>
          <p class="mb-2">Entrez une adresse en France pour commencer</p>
          <p class="text-xs">Distance + prix</p>
        </div>
      </div>
    </section>
  </main>

  <nav class="bottom-nav px-6 py-3 mobile-only">
    <div class="max-w-lg mx-auto flex justify-around items-center text-gray-400">
      <div class="flex flex-col items-center gap-1 text-blue-400">
        <i class="fas fa-search text-xl"></i>
        <span class="text-xs">Rechercher</span>
      </div>
      <div class="flex flex-col items-center gap-1">
        <i class="fas fa-heart text-xl"></i>
        <span class="text-xs">Favoris</span>
      </div>
      <div class="flex flex-col items-center gap-1">
        <i class="fas fa-cog text-xl"></i>
        <span class="text-xs">Paramètres</span>
      </div>
    </div>
  </nav>

  <script src="app.js"></script>
</body>
</html>
