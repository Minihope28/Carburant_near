<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  />
  <meta name="theme-color" content="#0f172a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>FuelFinder France</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
  />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  />

  <style>
    * {
      font-family: "Inter", sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: #0f172a;
      color: #e2e8f0;
      overflow-x: hidden;
      padding-bottom: 90px;
    }

    .glass {
      background: rgba(30, 41, 59, 0.7);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .glass-card {
      background: linear-gradient(
        135deg,
        rgba(30, 41, 59, 0.82),
        rgba(15, 23, 42, 0.92)
      );
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .fuel-btn,
    .sort-btn {
      transition: all 0.25s ease;
    }

    .fuel-btn.active,
    .sort-btn.active {
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      box-shadow: 0 4px 16px rgba(59, 130, 246, 0.35);
      border-color: #3b82f6;
      color: #fff;
    }

    .station-card {
      transition: all 0.25s ease;
      border-left: 3px solid transparent;
    }

    .station-card:hover {
      transform: translateX(4px);
      border-left-color: #3b82f6;
    }

    .price-tag {
      background: linear-gradient(135deg, #10b981, #059669);
      box-shadow: 0 4px 16px rgba(16, 185, 129, 0.25);
    }

    .price-tag.medium {
      background: linear-gradient(135deg, #f59e0b, #d97706);
    }

    .price-tag.expensive {
      background: linear-gradient(135deg, #ef4444, #dc2626);
    }

    .spinner {
      border: 3px solid rgba(255, 255, 255, 0.12);
      border-left-color: #3b82f6;
      border-radius: 50%;
      width: 42px;
      height: 42px;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes slideUp {
      from {
        transform: translateY(14px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .animate-slide-up {
      animation: slideUp 0.35s ease-out forwards;
    }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      background: transparent;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      height: 20px;
      width: 20px;
      border-radius: 50%;
      background: #3b82f6;
      cursor: pointer;
      margin-top: -8px;
      border: none;
    }

    input[type="range"]::-webkit-slider-runnable-track {
      width: 100%;
      height: 4px;
      background: #334155;
      border-radius: 2px;
    }

    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(15, 23, 42, 0.96);
      backdrop-filter: blur(20px);
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      z-index: 1000;
      padding-bottom: env(safe-area-inset-bottom);
    }

    .toast {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(-100px);
      background: rgba(30, 41, 59, 0.96);
      backdrop-filter: blur(12px);
      padding: 14px 20px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      z-index: 9999;
      transition: transform 0.3s ease;
      max-width: 90%;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
    }

    .autocomplete-container {
      position: relative;
      width: 100%;
    }

    .suggestions-list {
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      right: 0;
      background: rgba(30, 41, 59, 0.98);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 14px;
      max-height: 260px;
      overflow-y: auto;
      z-index: 100;
      display: none;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.45);
    }

    .suggestions-list.show {
      display: block;
    }

    .suggestion-item {
      padding: 12px 14px;
      cursor: pointer;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      transition: background 0.2s ease;
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }

    .suggestion-item:last-child {
      border-bottom: none;
    }

    .suggestion-item:hover {
      background: rgba(59, 130, 246, 0.16);
    }

    .suggestion-icon {
      color: #60a5fa;
      font-size: 14px;
      margin-top: 2px;
    }

    .suggestion-text {
      font-size: 14px;
      color: #e2e8f0;
    }

    .suggestion-context {
      font-size: 12px;
      color: #94a3b8;
      margin-top: 2px;
    }

    .error-card {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.25);
    }

    .line-clamp-2 {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .badge {
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 9999px;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    .badge-green {
      background: rgba(16, 185, 129, 0.14);
      color: #6ee7b7;
    }

    .badge-blue {
      background: rgba(59, 130, 246, 0.14);
      color: #93c5fd;
    }

    .badge-orange {
      background: rgba(245, 158, 11, 0.14);
      color: #fcd34d;
    }
  </style>
</head>
<body class="antialiased">
  <div id="toast" class="toast flex items-center gap-3">
    <i class="fas fa-info-circle text-blue-400 text-xl"></i>
    <span id="toastMessage" class="text-sm font-medium">Message</span>
  </div>

  <header class="fixed top-0 left-0 right-0 z-50 glass border-b border-white/10">
    <div class="max-w-lg mx-auto px-4 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div
          class="w-10 h-10 rounded-xl bg-gradient-to-br from-blue-500 to-blue-600 flex items-center justify-center shadow-lg shadow-blue-500/30"
        >
          <i class="fas fa-gas-pump text-white text-lg"></i>
        </div>
        <div>
          <h1 class="font-bold text-lg leading-tight">FuelFinder</h1>
          <p class="text-xs text-gray-400">Stations en France</p>
        </div>
      </div>

      <button
        onclick="refreshData()"
        class="w-10 h-10 rounded-full bg-white/5 flex items-center justify-center hover:bg-white/10 transition-colors"
        id="refreshBtn"
        aria-label="Rafraîchir"
      >
        <i class="fas fa-sync-alt text-gray-300"></i>
      </button>
    </div>
  </header>

  <main class="max-w-lg mx-auto px-4 pt-24 space-y-6">
    <section class="glass-card rounded-2xl p-4 space-y-4">
      <div class="flex items-center justify-between mb-2">
        <h2 class="font-semibold text-sm text-gray-300 uppercase tracking-wider">
          Localisation
        </h2>
        <span
          class="text-xs text-blue-400 cursor-pointer hover:text-blue-300"
          onclick="useMyLocation()"
        >
          <i class="fas fa-location-arrow mr-1"></i>Ma position
        </span>
      </div>

      <div class="autocomplete-container">
        <div class="relative">
          <input
            type="text"
            id="addressInput"
            placeholder="Ex: Antibes, Nice, 10 rue..."
            class="w-full bg-slate-800/50 border border-slate-700 rounded-xl px-4 py-3 pl-12 pr-28 text-sm focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 transition-all placeholder-gray-500"
            autocomplete="off"
          />
          <i
            class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-500"
          ></i>
          <button
            onclick="searchAddress()"
            class="absolute right-2 top-1/2 -translate-y-1/2 bg-blue-600 hover:bg-blue-500 text-white px-4 py-1.5 rounded-lg text-xs font-medium transition-colors"
          >
            Rechercher
          </button>
        </div>

        <div id="suggestionsList" class="suggestions-list"></div>
      </div>

      <div
        id="currentLocationDisplay"
        class="hidden text-xs text-blue-300 bg-blue-500/10 p-2 rounded-lg flex items-center gap-2"
      >
        <i class="fas fa-map-marker-alt"></i>
        <span id="currentLocationText"></span>
      </div>
    </section>

    <section class="glass-card rounded-2xl p-4">
      <div class="flex items-center justify-between mb-3">
        <h2 class="font-semibold text-sm text-gray-300 uppercase tracking-wider">
          Rayon de recherche
        </h2>
        <span class="text-blue-400 font-bold" id="radiusValue">5 km</span>
      </div>

      <input
        type="range"
        id="radiusSlider"
        min="1"
        max="20"
        value="5"
        step="0.5"
        class="w-full"
        oninput="updateRadius(this.value)"
        onchange="onRadiusChange()"
      />

      <div class="flex justify-between text-xs text-gray-500 mt-2">
        <span>1 km</span>
        <span>10 km</span>
        <span>20 km</span>
      </div>
    </section>

    <section class="glass-card rounded-2xl p-4">
      <h2 class="font-semibold text-sm text-gray-300 uppercase tracking-wider mb-3">
        Carburant
      </h2>

      <div class="grid grid-cols-3 gap-2">
        <button
          onclick="selectFuel('E10')"
          class="fuel-btn active bg-slate-800/50 border border-slate-700 rounded-xl p-3 text-center"
          data-fuel="E10"
        >
          <div class="text-lg font-bold mb-1">SP95-E10</div>
          <div class="text-xs text-gray-400">Sans Plomb 95</div>
        </button>

        <button
          onclick="selectFuel('SP98')"
          class="fuel-btn bg-slate-800/50 border border-slate-700 rounded-xl p-3 text-center"
          data-fuel="SP98"
        >
          <div class="text-lg font-bold mb-1">SP98</div>
          <div class="text-xs text-gray-400">Sans Plomb 98</div>
        </button>

        <button
          onclick="selectFuel('Gazole')"
          class="fuel-btn bg-slate-800/50 border border-slate-700 rounded-xl p-3 text-center"
          data-fuel="Gazole"
        >
          <div class="text-lg font-bold mb-1">Diesel</div>
          <div class="text-xs text-gray-400">Gazole</div>
        </button>
      </div>
    </section>

    <section class="glass-card rounded-2xl p-4">
      <h2 class="font-semibold text-sm text-gray-300 uppercase tracking-wider mb-3">
        Trier par
      </h2>

      <div class="grid grid-cols-3 gap-2">
        <button
          onclick="setSort('distance')"
          class="sort-btn active bg-slate-800/50 border border-slate-700 rounded-xl p-3 text-center text-sm"
          data-sort="distance"
        >
          <i class="fas fa-route mb-1 block"></i>
          Distance
        </button>

        <button
          onclick="setSort('price')"
          class="sort-btn bg-slate-800/50 border border-slate-700 rounded-xl p-3 text-center text-sm"
          data-sort="price"
        >
          <i class="fas fa-euro-sign mb-1 block"></i>
          Prix
        </button>

        <button
          onclick="setSort('both')"
          class="sort-btn bg-slate-800/50 border border-slate-700 rounded-xl p-3 text-center text-sm"
          data-sort="both"
        >
          <i class="fas fa-balance-scale mb-1 block"></i>
          Les deux
        </button>
      </div>
    </section>

    <section class="space-y-3 pb-6">
      <div class="flex items-center justify-between">
        <h2 class="font-semibold text-sm text-gray-300 uppercase tracking-wider">
          Stations trouvées
        </h2>
        <div class="flex items-center gap-2 text-xs">
          <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
          <span class="text-gray-400" id="stationCount">En attente</span>
        </div>
      </div>

      <div id="stationsList" class="space-y-3">
        <div class="glass-card rounded-2xl p-8 text-center text-gray-400">
          <i class="fas fa-map-marker-alt text-4xl mb-3 opacity-30"></i>
          <p class="mb-2">Entrez une adresse en France pour commencer</p>
          <p class="text-xs">Distance + prix</p>
        </div>
      </div>
    </section>
  </main>

  <nav class="bottom-nav px-6 py-3">
    <div class="max-w-lg mx-auto flex justify-around items-center text-gray-400">
      <div class="flex flex-col items-center gap-1 text-blue-400">
        <i class="fas fa-search text-xl"></i>
        <span class="text-xs">Rechercher</span>
      </div>
      <div class="flex flex-col items-center gap-1">
        <i class="fas fa-heart text-xl"></i>
        <span class="text-xs">Favoris</span>
      </div>
      <div class="flex flex-col items-center gap-1">
        <i class="fas fa-cog text-xl"></i>
        <span class="text-xs">Paramètres</span>
      </div>
    </div>
  </nav>

  <script>
    const CONFIG = {
      fuelApiUrl: "https://divine-voice-7f84.hamzaamal97-ha.workers.dev",
      geocodeUrl: "https://data.geopf.fr/geocodage/search",
      reverseGeocodeUrl: "https://data.geopf.fr/geocodage/reverse",
      radius: 5,
      selectedFuel: "E10",
      sortBy: "distance"
    };

    let stations = [];
    let currentPosition = null;
    let debounceTimer = null;

    document.addEventListener("DOMContentLoaded", () => {
      setupAutocomplete();
    });

    function setupAutocomplete() {
      const input = document.getElementById("addressInput");
      const suggestionsList = document.getElementById("suggestionsList");

      input.addEventListener("input", (e) => {
        const query = e.target.value.trim();

        if (query.length < 3) {
          suggestionsList.classList.remove("show");
          return;
        }

        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(() => fetchSuggestions(query), 300);
      });

      input.addEventListener("keypress", (e) => {
        if (e.key === "Enter") {
          suggestionsList.classList.remove("show");
          searchAddress();
        }
      });

      document.addEventListener("click", (e) => {
        if (!e.target.closest(".autocomplete-container")) {
          suggestionsList.classList.remove("show");
        }
      });
    }

    async function fetchSuggestions(query) {
      try {
        const url = `${CONFIG.geocodeUrl}?q=${encodeURIComponent(query)}&limit=5&autocomplete=1`;
        const response = await fetch(url);
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const data = await response.json();
        displaySuggestions(data.features || []);
      } catch (error) {
        console.error("Erreur autocomplétion :", error);
      }
    }

    function displaySuggestions(suggestions) {
      const suggestionsList = document.getElementById("suggestionsList");
      const currentQuery = document.getElementById("addressInput").value.trim();

      if (!suggestions.length) {
        suggestionsList.classList.remove("show");
        suggestionsList.innerHTML = "";
        return;
      }

      suggestionsList.innerHTML = suggestions
        .map((feature) => {
          const label = feature.properties?.label || "Adresse";
          const context = feature.properties?.context || "";
          const type = feature.properties?.type || "";
          const coords = feature.geometry?.coordinates || [0, 0];

          let icon = "fa-map-marker-alt";
          if (type === "housenumber") icon = "fa-home";
          else if (type === "street") icon = "fa-road";
          else if (type === "municipality" || type === "locality") icon = "fa-city";

          return `
            <div class="suggestion-item" onclick="selectSuggestion(${JSON.stringify(label)}, ${coords[1]}, ${coords[0]})">
              <i class="fas ${icon} suggestion-icon"></i>
              <div style="flex:1;">
                <div class="suggestion-text">${highlightMatch(label, currentQuery)}</div>
                <div class="suggestion-context">${context}</div>
              </div>
            </div>
          `;
        })
        .join("");

      suggestionsList.classList.add("show");
    }

    function escapeRegExp(string) {
      return string.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    }

    function highlightMatch(text, query) {
      if (!query) return text;
      const safeQuery = escapeRegExp(query);
      const regex = new RegExp(`(${safeQuery})`, "gi");
      return text.replace(
        regex,
        '<span style="color:#60a5fa;font-weight:600;">$1</span>'
      );
    }

    async function selectSuggestion(label, lat, lon) {
      document.getElementById("addressInput").value = label;
      document.getElementById("suggestionsList").classList.remove("show");

      currentPosition = {
        lat: parseFloat(lat),
        lon: parseFloat(lon)
      };

      document.getElementById("currentLocationText").textContent = label;
      document.getElementById("currentLocationDisplay").classList.remove("hidden");

      await searchStations(currentPosition.lat, currentPosition.lon);
    }

    function updateRadius(value) {
      CONFIG.radius = parseFloat(value);
      document.getElementById("radiusValue").textContent = `${value} km`;
    }

    function onRadiusChange() {
      if (currentPosition) {
        searchStations(currentPosition.lat, currentPosition.lon);
      }
    }

    function selectFuel(fuel) {
      CONFIG.selectedFuel = fuel;

      document.querySelectorAll(".fuel-btn").forEach((btn) => {
        btn.classList.remove("active");
        if (btn.dataset.fuel === fuel) {
          btn.classList.add("active");
        }
      });

      if (currentPosition) {
        searchStations(currentPosition.lat, currentPosition.lon);
      }
    }

    function setSort(sortType) {
      CONFIG.sortBy = sortType;

      document.querySelectorAll(".sort-btn").forEach((btn) => {
        btn.classList.remove("active");
        if (btn.dataset.sort === sortType) {
          btn.classList.add("active");
        }
      });

      if (stations.length) {
        sortAndDisplayStations();
      }
    }

    async function useMyLocation() {
      if (!navigator.geolocation) {
        showToast("Géolocalisation non supportée", "error");
        return;
      }

      showToast("Recherche de votre position...", "info");

      navigator.geolocation.getCurrentPosition(
        async (position) => {
          const { latitude, longitude } = position.coords;
          currentPosition = { lat: latitude, lon: longitude };

          try {
            const response = await fetch(
              `${CONFIG.reverseGeocodeUrl}?lon=${longitude}&lat=${latitude}&limit=1`
            );
            if (response.ok) {
              const data = await response.json();
              const label =
                data.features?.[0]?.properties?.label || "Position actuelle";

              document.getElementById("addressInput").value = label;
              document.getElementById("currentLocationText").textContent = label;
              document
                .getElementById("currentLocationDisplay")
                .classList.remove("hidden");
            }
          } catch (error) {
            console.warn("Reverse geocoding impossible :", error);
          }

          await searchStations(latitude, longitude);
          showToast("Position trouvée", "success");
        },
        (error) => {
          console.error(error);
          showToast("Impossible d’obtenir la position", "error");
        },
        {
          enableHighAccuracy: true,
          timeout: 10000,
          maximumAge: 60000
        }
      );
    }

    async function searchAddress() {
      const query = document.getElementById("addressInput").value.trim();

      if (!query) {
        showToast("Entrez une adresse", "error");
        return;
      }

      document.getElementById("suggestionsList").classList.remove("show");
      showToast("Recherche...", "info");

      try {
        const response = await fetch(
          `${CONFIG.geocodeUrl}?q=${encodeURIComponent(query)}&limit=1`
        );

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const data = await response.json();

        if (!data.features || !data.features.length) {
          showToast("Adresse non trouvée", "error");
          return;
        }

        const feature = data.features[0];
        const [lon, lat] = feature.geometry.coordinates;
        const address = feature.properties?.label || query;

        currentPosition = {
          lat: parseFloat(lat),
          lon: parseFloat(lon)
        };

        document.getElementById("addressInput").value = address;
        document.getElementById("currentLocationText").textContent = address;
        document
          .getElementById("currentLocationDisplay")
          .classList.remove("hidden");

        await searchStations(currentPosition.lat, currentPosition.lon);
      } catch (error) {
        console.error("Erreur recherche adresse :", error);
        showToast("Erreur pendant la recherche", "error");
      }
    }

    async function searchStations(lat, lon) {
      document.getElementById("stationsList").innerHTML = `
        <div class="glass-card rounded-2xl p-8 text-center">
          <div class="spinner mx-auto mb-4"></div>
          <p class="text-gray-400 text-sm">Recherche des stations...</p>
        </div>
      `;

      try {
        const url =
          `${CONFIG.fuelApiUrl}` +
          `?lat=${encodeURIComponent(lat)}` +
          `&lon=${encodeURIComponent(lon)}` +
          `&radius=${encodeURIComponent(CONFIG.radius)}`;

        const response = await fetch(url, {
          headers: {
            Accept: "application/json"
          }
        });

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const data = await response.json();

        if (!data.results || !Array.isArray(data.results)) {
          throw new Error("Réponse API invalide");
        }

        processGouvStations(data.results, lat, lon);
      } catch (error) {
        console.error("Erreur recherche stations :", error);
        showError(
          "Impossible de charger les stations pour le moment. Réessayez un peu plus tard."
        );
      }
    }

    function processGouvStations(results, userLat, userLon) {

  stations = [];

  for (const fields of results) {

    const lat = parseFloat(fields.latitude) / 100000;
    const lon = parseFloat(fields.longitude) / 100000;

    if (Number.isNaN(lat) || Number.isNaN(lon)) continue;

    const distance = fields._distance
      ? fields._distance / 1000
      : calculateDistance(userLat, userLon, lat, lon);

    let price = null;

    if (CONFIG.selectedFuel === "E10") {
      price = parseFloat(fields.e10_prix);
    }
    else if (CONFIG.selectedFuel === "SP98") {
      price = parseFloat(fields.sp98_prix);
    }
    else if (CONFIG.selectedFuel === "Gazole") {
      price = parseFloat(fields.gazole_prix);
    }

    if (!price) continue;

    stations.push({
      id: fields.id,
      brand: "Station",
      address: `${fields.adresse}, ${fields.cp} ${fields.ville}`,
      lat,
      lon,
      price,
      distance,
      fuel: CONFIG.selectedFuel,
      updateTime: new Date().toISOString()
    });

  }

  if (!stations.length) {
    showEmpty("Aucune station trouvée dans ce rayon.");
    return;
  }

  sortAndDisplayStations();
}

    function formatGouvAddress(fields) {
      const parts = [];
      if (fields.adresse) parts.push(fields.adresse);
      if (fields.cp) parts.push(fields.cp);
      if (fields.ville) parts.push(fields.ville);
      return parts.join(", ") || "Adresse non disponible";
    }

    function calculateDistance(lat1, lon1, lat2, lon2) {
      const R = 6371;
      const dLat = ((lat2 - lat1) * Math.PI) / 180;
      const dLon = ((lon2 - lon1) * Math.PI) / 180;

      const a =
        Math.sin(dLat / 2) * Math.sin(dLat / 2) +
        Math.cos((lat1 * Math.PI) / 180) *
          Math.cos((lat2 * Math.PI) / 180) *
          Math.sin(dLon / 2) *
          Math.sin(dLon / 2);

      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
      return Math.round(R * c * 100) / 100;
    }

    function sortAndDisplayStations() {
      if (!stations.length) return;

      if (CONFIG.sortBy === "distance") {
        stations.sort((a, b) => a.distance - b.distance);
      } else if (CONFIG.sortBy === "price") {
        stations.sort((a, b) => a.price - b.price);
      } else if (CONFIG.sortBy === "both") {
        const maxDist = Math.max(...stations.map((s) => s.distance), 0.1);
        const minPrice = Math.min(...stations.map((s) => s.price));
        const maxPrice = Math.max(...stations.map((s) => s.price));
        const priceRange = maxPrice - minPrice || 1;

        stations.forEach((s) => {
          const priceScore = (s.price - minPrice) / priceRange;
          const distScore = s.distance / maxDist;
          s.score = priceScore * 0.6 + distScore * 0.4;
        });

        stations.sort((a, b) => a.score - b.score);
      }

      updateUI();
    }

    function updateUI() {
      const stationCount = document.getElementById("stationCount");
      const stationsList = document.getElementById("stationsList");

      stationCount.textContent = `${stations.length} station${stations.length > 1 ? "s" : ""}`;

      const cheapestPrice = Math.min(...stations.map((s) => s.price));
      const closestDistance = Math.min(...stations.map((s) => s.distance));

      stationsList.innerHTML = stations
        .slice(0, 20)
        .map((station, index) => {
          const isCheapest = station.price === cheapestPrice;
          const isClosest = station.distance === closestDistance;

          const priceClass = isCheapest
            ? ""
            : station.price > cheapestPrice * 1.03
            ? "expensive"
            : "medium";

          let badges = "";
          if (isCheapest) {
            badges += `<span class="badge badge-green"><i class="fas fa-euro-sign"></i> Meilleur prix</span>`;
          }
          if (isClosest) {
            badges += `<span class="badge badge-blue"><i class="fas fa-location-arrow"></i> Plus proche</span>`;
          }
          if (!isCheapest && !isClosest && CONFIG.sortBy === "both") {
            badges += `<span class="badge badge-orange"><i class="fas fa-balance-scale"></i> Bon compromis</span>`;
          }

          const mapsUrl = `https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(
            station.address
          )}&travelmode=driving`;

          const updateDate = formatUpdateDate(station.updateTime);

          return `
            <div class="station-card glass-card rounded-2xl p-4 animate-slide-up" style="animation-delay:${index * 0.04}s">
              <div class="flex items-start justify-between gap-3">
                <div class="flex-1 min-w-0">
                  <div class="flex items-center flex-wrap gap-1 mb-1">
                    <h3 class="font-semibold text-white truncate">${escapeHtml(station.brand)}</h3>
                    ${badges}
                  </div>

                  <p class="text-sm text-gray-400 mb-2 line-clamp-2">${escapeHtml(
                    station.address
                  )}</p>

                  <div class="flex items-center gap-4 text-xs text-gray-500 flex-wrap">
                    <span class="flex items-center gap-1">
                      <i class="fas fa-map-marker-alt text-blue-400"></i>
                      <span class="font-medium text-blue-300">${station.distance.toFixed(1)} km</span>
                    </span>

                    <span class="flex items-center gap-1">
                      <i class="fas fa-clock text-gray-400"></i>
                      ${updateDate}
                    </span>
                  </div>
                </div>

                <div class="text-right flex flex-col items-end">
                  <div class="price-tag ${priceClass} text-white px-3 py-2 rounded-xl font-bold text-lg mb-1">
                    ${station.price.toFixed(3)}€
                  </div>

                  ${
                    !isCheapest
                      ? `<div class="text-xs text-gray-500">+${((station.price - cheapestPrice) * 100).toFixed(1)} c</div>`
                      : `<div class="text-xs text-green-400 font-medium">Top prix</div>`
                  }
                </div>
              </div>

              <div class="mt-3 pt-3 border-t border-white/5 flex items-center justify-between">
                <a
                  href="${mapsUrl}"
                  target="_blank"
                  rel="noopener noreferrer"
                  class="text-blue-400 text-sm hover:text-blue-300 flex items-center gap-2 transition-colors"
                >
                  <i class="fas fa-directions"></i>
                  Itinéraire Maps
                </a>

                <button
                  onclick="toggleFavorite('${station.id}')"
                  class="text-gray-500 hover:text-red-400 transition-colors p-2"
                  id="fav-${station.id}"
                  aria-label="Favori"
                >
                  <i class="far fa-heart text-lg"></i>
                </button>
              </div>
            </div>
          `;
        })
        .join("");
    }

    function formatUpdateDate(dateString) {
      try {
        const date = new Date(dateString);
        if (Number.isNaN(date.getTime())) return "Maj inconnue";

        return date.toLocaleString("fr-FR", {
          day: "2-digit",
          month: "2-digit",
          hour: "2-digit",
          minute: "2-digit"
        });
      } catch {
        return "Maj inconnue";
      }
    }

    function escapeHtml(str) {
      if (typeof str !== "string") return "";
      return str
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function showError(message) {
      document.getElementById("stationsList").innerHTML = `
        <div class="glass-card error-card rounded-2xl p-8 text-center">
          <i class="fas fa-exclamation-triangle text-red-400 text-4xl mb-3"></i>
          <p class="text-red-200 mb-2">${escapeHtml(message)}</p>
          <button onclick="refreshData()" class="mt-4 bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded-lg text-sm">
            Réessayer
          </button>
        </div>
      `;

      document.getElementById("stationCount").textContent = "Erreur";
      showToast(message, "error");
    }

    function refreshData() {
      const btn = document.getElementById("refreshBtn");
      btn.classList.add("animate-spin");
      setTimeout(() => btn.classList.remove("animate-spin"), 900);

      if (!currentPosition) {
        showToast("Entrez d’abord une adresse", "error");
        return;
      }

      searchStations(currentPosition.lat, currentPosition.lon);
    }

    function toggleFavorite(stationId) {
      const btn = document.getElementById(`fav-${stationId}`);
      if (!btn) return;

      const icon = btn.querySelector("i");
      if (!icon) return;

      if (icon.classList.contains("far")) {
        icon.classList.remove("far");
        icon.classList.add("fas");
        btn.classList.add("text-red-400");
        showToast("Ajouté aux favoris", "success");
      } else {
        icon.classList.remove("fas");
        icon.classList.add("far");
        btn.classList.remove("text-red-400");
        showToast("Retiré des favoris", "info");
      }
    }

    function showToast(message, type = "info") {
      const toast = document.getElementById("toast");
      const icon = toast.querySelector("i");
      const text = document.getElementById("toastMessage");

      text.textContent = message;

      if (type === "success") {
        icon.className = "fas fa-check-circle text-green-400 text-xl";
      } else if (type === "error") {
        icon.className = "fas fa-exclamation-circle text-red-400 text-xl";
      } else {
        icon.className = "fas fa-info-circle text-blue-400 text-xl";
      }

      toast.classList.add("show");
      clearTimeout(showToast._timer);
      showToast._timer = setTimeout(() => {
        toast.classList.remove("show");
      }, 3000);
    }
  </script>
</body>
</html>
