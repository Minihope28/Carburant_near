  <title>FuelFinder — Stations en France</title>

<body>

  <div id="toast" class="toast">
    <span class="toast-dot" id="toastDot"></span>
    <span id="toastMessage">Message</span>
  </div>

  <div id="suggestionsPortal" class="suggestions-portal hidden"></div>

  <header class="app-header">
    <div class="header-inner">
      <div class="brand">
        <div class="brand-mark">
          <i class="fas fa-gas-pump"></i>
        </div>
        <div class="brand-text">
          <span class="brand-name">FuelFinder</span>
          <span class="brand-sub">Stations en France</span>
        </div>
      </div>
      <button onclick="refreshData()" class="btn-icon" id="refreshBtn" aria-label="Rafraîchir">
        <i class="fas fa-sync-alt"></i>
      </button>
    </div>
  </header>

  <main class="app-main">

```
<aside class="panel-controls">

  <section class="ctrl-section">
    <div class="ctrl-header">
      <label class="ctrl-label">Localisation</label>
      <button class="text-link" onclick="useMyLocation()">
        <i class="fas fa-location-arrow"></i> Ma position
      </button>
    </div>
    <div class="input-wrap">
      <i class="fas fa-search field-icon"></i>
      <input
        type="text"
        id="addressInput"
        placeholder="Ville, adresse, code postal..."
        class="field-input"
        autocomplete="off"
      />
      <button onclick="searchAddress()" class="btn-search">Chercher</button>
    </div>
    <div id="suggestionsList"></div>
    <div id="currentLocationDisplay" class="location-tag hidden">
      <i class="fas fa-map-pin"></i>
      <span id="currentLocationText"></span>
    </div>
  </section>

  <section class="ctrl-section">
    <div class="ctrl-header">
      <label class="ctrl-label">Rayon</label>
      <span class="ctrl-value" id="radiusValue">5 km</span>
    </div>
    <input type="range" id="radiusSlider" min="1" max="10" value="5" step="0.5"
      class="range-input"
      oninput="updateRadius(this.value)" onchange="onRadiusChange()" />
    <div class="range-marks">
      <span>1 km</span><span>5 km</span><span>10 km</span>
    </div>
  </section>

  <section class="ctrl-section">
    <div class="ctrl-header">
      <label class="ctrl-label">Carburant</label>
    </div>
    <div class="chip-group">
      <button onclick="selectFuel('E10')" class="chip-btn active" data-fuel="E10">
        <span class="chip-title">SP95-E10</span>
        <span class="chip-sub">Sans plomb 95</span>
      </button>
      <button onclick="selectFuel('SP98')" class="chip-btn" data-fuel="SP98">
        <span class="chip-title">SP98</span>
        <span class="chip-sub">Sans plomb 98</span>
      </button>
      <button onclick="selectFuel('Gazole')" class="chip-btn" data-fuel="Gazole">
        <span class="chip-title">Gazole</span>
        <span class="chip-sub">Diesel</span>
      </button>
    </div>
  </section>

  <section class="ctrl-section">
    <div class="ctrl-header">
      <label class="ctrl-label">Trier par</label>
    </div>
    <div class="chip-group chip-group-row">
      <button onclick="setSort('distance')" class="chip-btn chip-sm active" data-sort="distance">
        <i class="fas fa-route"></i> Distance
      </button>
      <button onclick="setSort('price')" class="chip-btn chip-sm" data-sort="price">
        <i class="fas fa-euro-sign"></i> Prix
      </button>
      <button onclick="setSort('both')" class="chip-btn chip-sm" data-sort="both">
        <i class="fas fa-balance-scale"></i> Mix
      </button>
    </div>
  </section>

</aside>

<section class="panel-results">

  <div class="results-header">
    <div class="results-title-row">
      <div class="results-title-left">
        <span class="status-orb" id="statusOrb"></span>
        <div>
          <p class="results-eyebrow">Recherche</p>
          <h2 class="results-title">Stations trouvées</h2>
        </div>
      </div>
      <span class="count-badge" id="stationCount">En attente</span>
    </div>
    <div class="metrics-row">
      <div class="metric">
        <span class="metric-label">Meilleur prix</span>
        <span class="metric-val metric-amber" id="bestPriceValue">—</span>
      </div>
      <div class="metric-sep"></div>
      <div class="metric">
        <span class="metric-label">Plus proche</span>
        <span class="metric-val" id="closestValue">—</span>
      </div>
      <div class="metric-sep"></div>
      <div class="metric">
        <span class="metric-label">Carburant</span>
        <span class="metric-val" id="fuelValue">SP95-E10</span>
      </div>
    </div>
  </div>

  <div id="stationsList" class="stations-list">
    <div class="empty-state">
      <div class="empty-icon-wrap"><i class="fas fa-map-marked-alt"></i></div>
      <p class="empty-title">Entrez une adresse en France pour commencer</p>
      <p class="empty-sub">Distance + prix en temps réel</p>
    </div>
  </div>

</section>
